/* ═══════════════════════════════════════════════════════════════
   CAMADA DE API — MOCK (false) ou REAL (true)
   Quando USE_BACKEND for true, chama as Netlify Functions.
   Quando for false, simula tudo localmente.
   ═══════════════════════════════════════════════════════════════ */
const api = {
  async login(usuario, pin) {
    if (USE_BACKEND) {
      const res = await fetch("/.netlify/functions/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ usuario, pin }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.erro || "PIN incorreto");
      return data;
    }
    // Mock: simula delay de rede
    await new Promise(r => setTimeout(r, 700));
    if (MOCK_PINS[usuario] !== pin) throw new Error("PIN incorreto");
    return {
      token: `demo_${Date.now()}`,
      usuario,
      expiresAt: new Date(Date.now() + 12 * 3600000).toISOString(),
    };
  },

  getToken() {
    return sessionStorage.getItem("sToken") || "";
  },

  async _req(path, opts = {}) {
    const res = await fetch(`/.netlify/functions${path}`, {
      ...opts,
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${this.getToken()}`,
        ...opts.headers,
      },
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.erro || "Erro");
    return data;
  },
};

/* ═══════════════════════════════════════════════════════════════
   TELA DE LOGIN
   ═══════════════════════════════════════════════════════════════ */
function LoginScreen({ onLogin, dk }) {
  const C = getC(dk);
  const [etapa, setEtapa]             = useState("usuario");  // "usuario" | "pin"
  const [usuarioSel, setUsuarioSel]   = useState(null);
  const [pin, setPin]                 = useState("");
  const [erro, setErro]               = useState("");
  const [loading, setLoading]         = useState(false);
  const [shake, setShake]             = useState(false);

  const teclas = ["1","2","3","4","5","6","7","8","9","","0","⌫"];

  const pressionarTecla = async (t) => {
    if (loading) return;
    if (t === "⌫") { setPin(p => p.slice(0,-1)); setErro(""); return; }
    if (t === "") return;

    const novoPin = pin + t;
    setPin(novoPin);

    if (novoPin.length === 4) {
      setLoading(true);
      setErro("");
      try {
        await onLogin(usuarioSel, novoPin);
      } catch (e) {
        setShake(true);
        setErro(e.message || "PIN incorreto");
        setPin("");
        setTimeout(() => setShake(false), 500);
      } finally {
        setLoading(false);
      }
    }
  };

  return (
    <div style={{
      minHeight:"100vh", background:C.bg, display:"flex",
      alignItems:"center", justifyContent:"center",
      fontFamily:"'DM Sans',system-ui,sans-serif", padding:20,
    }}>
      <div style={{ width:"100%", maxWidth:400, textAlign:"center" }}>
        {/* Logo */}
        <div style={{ marginBottom:32 }}>
          <div style={{ fontSize:40, marginBottom:8 }}>⚖️</div>
          <div style={{ fontSize:22, fontWeight:800, color:C.text }}>Painel Societário</div>
          <div style={{ fontSize:13, color:C.muted, marginTop:4 }}>WebContador</div>
        </div>

        {/* ETAPA 1: Selecionar usuária */}
        {etapa === "usuario" && (
          <div>
            <div style={{ fontSize:14, color:C.sub, marginBottom:16, fontWeight:600 }}>
              Quem é você?
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {USERS.map(u => (
                <button
                  key={u}
                  onClick={() => { setUsuarioSel(u); setEtapa("pin"); setPin(""); setErro(""); }}
                  style={{
                    display:"flex", alignItems:"center", gap:14,
                    background:C.card, border:`1.5px solid ${C.border}`,
                    borderRadius:12, padding:"14px 18px",
                    cursor:"pointer", color:C.text,
                    transition:"all .15s",
                  }}
                  onMouseOver={e => { e.currentTarget.style.borderColor = USER_COLORS[u]; e.currentTarget.style.transform = "translateX(4px)"; }}
                  onMouseOut={e => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.transform = "translateX(0)"; }}
                >
                  <div style={{
                    width:40, height:40, borderRadius:"50%",
                    background:USER_COLORS[u] + "30",
                    border:`2px solid ${USER_COLORS[u]}`,
                    display:"flex", alignItems:"center", justifyContent:"center",
                    fontSize:16, fontWeight:800, color:USER_COLORS[u],
                    flexShrink:0,
                  }}>
                    {u[0]}
                  </div>
                  <span style={{ fontSize:15, fontWeight:700 }}>{u}</span>
                  <span style={{ marginLeft:"auto", color:C.muted, fontSize:18 }}>›</span>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* ETAPA 2: Digitar PIN */}
        {etapa === "pin" && (
          <div>
            <button
              onClick={() => { setEtapa("usuario"); setPin(""); setErro(""); }}
              style={{ background:"none", border:"none", color:C.sub, fontSize:13, cursor:"pointer", marginBottom:20 }}
            >
              ← Trocar usuária
            </button>

            {/* Avatar da usuária */}
            <div style={{ marginBottom:24 }}>
              <div style={{
                width:64, height:64, borderRadius:"50%",
                background:USER_COLORS[usuarioSel] + "25",
                border:`3px solid ${USER_COLORS[usuarioSel]}`,
                display:"flex", alignItems:"center", justifyContent:"center",
                fontSize:24, fontWeight:800, color:USER_COLORS[usuarioSel],
                margin:"0 auto 10px",
              }}>
                {usuarioSel?.[0]}
              </div>
              <div style={{ fontSize:16, fontWeight:700, color:C.text }}>{usuarioSel}</div>
              <div style={{ fontSize:12, color:C.muted, marginTop:2 }}>Digite seu PIN de 4 dígitos</div>
            </div>

            {/* Dots do PIN */}
            <div style={{
              display:"flex", justifyContent:"center", gap:14, marginBottom:8,
              animation: shake ? "shake .4s ease" : "none",
            }}>
              {[0,1,2,3].map(i => (
                <div key={i} style={{
                  width:18, height:18, borderRadius:"50%",
                  background: i < pin.length ? USER_COLORS[usuarioSel] : "none",
                  border: `2px solid ${i < pin.length ? USER_COLORS[usuarioSel] : C.border}`,
                  transition:"all .15s",
                  transform: i < pin.length ? "scale(1.1)" : "scale(1)",
                }}/>
              ))}
            </div>

            {erro && (
              <div style={{ fontSize:12, color:C.red, marginBottom:12, fontWeight:600 }}>
                {erro}
              </div>
            )}
            {!erro && <div style={{ height:24 }}/>}

            {/* Teclado numérico */}
            <div style={{
              display:"grid", gridTemplateColumns:"repeat(3, 1fr)",
              gap:10, maxWidth:260, margin:"0 auto",
            }}>
              {teclas.map((t, i) => (
                <button
                  key={i}
                  onClick={() => pressionarTecla(t)}
                  disabled={loading || t === ""}
                  style={{
                    height:62, borderRadius:12,
                    fontSize: t === "⌫" ? 20 : 22,
                    fontWeight:700,
                    background: t === "" ? "transparent" : C.card,
                    border: t === "" ? "none" : `1.5px solid ${C.border}`,
                    color: t === "⌫" ? C.muted : C.text,
                    cursor: t === "" ? "default" : "pointer",
                    transition:"all .1s",
                    opacity: loading ? 0.5 : 1,
                  }}
                  onMouseOver={e => { if(t !== "") e.currentTarget.style.borderColor = USER_COLORS[usuarioSel]; }}
                  onMouseOut={e => { if(t !== "") e.currentTarget.style.borderColor = C.border; }}
                >
                  {loading && t === pin[pin.length-1] ? "⟳" : t}
                </button>
              ))}
            </div>

            <div style={{ fontSize:11, color:C.muted, marginTop:20 }}>
              PIN inicial: <strong>1234</strong> — Sabrina pode trocar para você
            </div>
          </div>
        )}

        <style>{`
          @keyframes shake {
            0%,100%{transform:translateX(0)}
            20%{transform:translateX(-8px)}
            40%{transform:translateX(8px)}
            60%{transform:translateX(-6px)}
            80%{transform:translateX(6px)}
          }
        `}</style>
      </div>
    </div>
  );
}

  const fire = m => { setToast(m); setTimeout(() => setToast(null), 2500); };

  useEffect(() => {

    const data = await api.login(usuario, pin);
    sessionStorage.setItem("sToken", data.token);
    sessionStorage.setItem("sUser",  data.usuario);
    sessionStorage.setItem("sExp",   data.expiresAt);
    setLoggedUser(data.usuario);
    setUser(data.usuario);

    // Registra no log local de demonstração
    const agora = new Date();
    const hora  = agora.getHours();
    const dia   = agora.getDay();
    setAccessLog(prev => [{
      id:              Date.now(),
      user_name:       data.usuario,
      accessed_at:     agora.toISOString(),
      success:         true,
      is_outside_hours: hora < 8 || hora >= 18,
      is_weekend:      dia === 0 || dia === 6,
      is_holiday:      false,
    }, ...prev]);
  };

  /* ── Handler de logout ── */
  const handleLogout = () => {
    sessionStorage.removeItem("sToken");
    sessionStorage.removeItem("sUser");
    sessionStorage.removeItem("sExp");
    setLoggedUser(null);
    setView("dashboard");
  };

  /* ── KPIs por responsável ── */
  const respKpis = useMemo(() => {
    const map = {};
    USERS.forEach(u => { map[u] = { procSteps:0, procIds:[], movSteps:0, movIds:[] }; });
    procs.filter(p => p.status === "active").forEach(p => {
      (p.steps||[]).forEach(s => {
        if (!s.completedAt && map[s.responsible]) {
          map[s.responsible].procSteps++;
          if (!map[s.responsible].procIds.includes(p.id)) map[s.responsible].procIds.push(p.id);
        }
      });
    });
    movs.filter(m => m.status === "active").forEach(m => {
      m.steps.forEach(s => {
        if (!s.completedAt && map[s.responsible]) {
          map[s.responsible].movSteps++;
          if (!map[s.responsible].movIds.includes(m.id)) map[s.responsible].movIds.push(m.id);
        }
      });
    });
    return map;
  }, [procs, movs]);

  /* ── Exportar CSV ── */
  const exportToExcel = () => {
    const headers = ["ID","Cliente","CNPJ","Tipo","Competência","Status","Progresso","Criado Por"];
    const data = movs.map(m => {
      const done = m.steps.filter(s => s.completedAt).length;
      return [m.id, m.clientName, m.cnpj || "", (MOV_TYPES[m.tipo]||MOV_TYPES.outros).label,
              m.competencia, m.status==="completed"?"Concluída":"Em andamento",
              `${done}/${m.steps.length}`, m.createdBy];
    });
    let csv = headers.join(",") + "\n" + data.map(r => r.map(c => `"${c}"`).join(",")).join("\n");
    const blob = new Blob([csv], { type:"text/csv;charset=utf-8;" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `movimentacoes_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    fire("📊 Planilha exportada!");

            const cor = USER_COLORS[r.user_name] || C.muted;
            return (
              <div key={r.id} style={{ background:C.card, border:`1px solid ${suspeito?C.red:C.border}`, borderRadius:8, padding:"10px 14px", display:"flex", alignItems:"center", gap:12 }}>
                <div style={{ width:34, height:34, borderRadius:"50%", background:cor+"25", border:`2px solid ${cor}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:800, color:cor, flexShrink:0 }}>
                  {r.user_name?.[0]}
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, fontWeight:700, color:C.text }}>{r.user_name}</div>
                  <div style={{ fontSize:11, color:C.sub }}>{fDT(r.accessed_at)}</div>
                </div>
                <div style={{ textAlign:"right" }}>
                  {!r.success && <Pill bg={C.redBg} c={C.red}>PIN errado</Pill>}
                  {r.is_outside_hours && <Pill bg={C.amberBg} c={C.amber}>Fora hora</Pill>}
                  {r.is_weekend && <Pill bg={C.amberBg} c={C.amber}>Fim sem.</Pill>}
                  {r.is_holiday && <Pill bg={C.redBg} c={C.red}>Feriado</Pill>}
                  {!suspeito && r.success && <Pill bg={C.greenBg} c={C.green}>Normal</Pill>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  /* ══════════════════════════════
     RENDERIZAÇÃO PRINCIPAL
  ══════════════════════════════ */

  // Enquanto verifica a sessão, não renderiza nada (evita flash)
  if (!sessionReady) return null;

  // Se não está logado, mostra a tela de login
  if (!loggedUser) return <LoginScreen onLogin={handleLogin} dk={dk} />;

  // App principal
  return (
    <div style={{ fontFamily:"'DM Sans',system-ui,sans-serif", background:C.bg, color:C.text, height:"100vh", display:"flex", overflow:"hidden" }}>
      {/* ── Sidebar ── */}
      <div style={{ width:220, background:dk?"#0a0f1a":"#fff", borderRight:`1px solid ${C.border}`, display:"flex", flexDirection:"column", flexShrink:0 }}>
        {/* Header */}
        <div style={{ padding:"14px 12px 8px", borderBottom:`1px solid ${C.border}` }}>
          <div style={{ fontSize:17, fontWeight:800, color:C.text }}>⚖️ WebContador</div>
          <div style={{ fontSize:11, color:C.muted }}>Painel Societário v11</div>
        </div>

        {/* Nav */}
        <div style={{ padding:"6px 0", flex:1, overflowY:"auto" }}>
          <div style={{ fontSize:9, fontWeight:700, color:C.muted, padding:"8px 12px 2px", textTransform:"uppercase", letterSpacing:".08em" }}>Dashboard</div>
          <SB active={view==="dashboard"} icon="🏠" label="Visão Geral"    color={C.accent} onClick={() => setView("dashboard")} />
          {selRespFilter && (
            <SB active={view==="tasks"} icon="📋" label={`${selRespFilter}`} color={C.amber}
              onClick={() => setView("tasks")}
              badge={(respKpis[selRespFilter]?.procSteps||0)+(respKpis[selRespFilter]?.movSteps||0)} />
          )}
          <div style={{ fontSize:9, fontWeight:700, color:C.muted, padding:"8px 12px 2px", textTransform:"uppercase", letterSpacing:".08em" }}>Societário</div>
          <SB active={view==="procs"} icon="📁" label="Processos"    color={C.purple} onClick={() => setView("procs")}  badge={procs.filter(p=>p.status==="active").length} />
          <div style={{ fontSize:9, fontWeight:700, color:C.muted, padding:"8px 12px 2px", textTransform:"uppercase", letterSpacing:".08em" }}>Mov. Mensal</div>
          <SB active={view==="movs"} icon="📋" label="Movimentações" color={C.teal}   onClick={() => setView("movs")}   badge={movs.filter(m=>m.status==="active").length} />
          {/* Log de acesso — só para Sabrina */}
          {loggedUser === "Sabrina" && (
            <>
              <div style={{ fontSize:9, fontWeight:700, color:C.muted, padding:"8px 12px 2px", textTransform:"uppercase", letterSpacing:".08em" }}>Administração</div>
              <SB active={view==="log"} icon="🔐" label="Log de Acesso" color={C.red} onClick={() => setView("log")}
                badge={accessLog.filter(r=>r.is_outside_hours||r.is_weekend||r.is_holiday).length} />
            </>
          )}
        </div>

        {/* Footer com usuário logado + sair */}
        <div style={{ padding:"8px 12px", borderTop:`1px solid ${C.border}` }}>
          {/* Usuário logado */}
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
            <div style={{ width:28, height:28, borderRadius:"50%", background:USER_COLORS[loggedUser]+"30", border:`2px solid ${USER_COLORS[loggedUser]}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:800, color:USER_COLORS[loggedUser] }}>
              {loggedUser?.[0]}
            </div>
            <div>
              <div style={{ fontSize:12, fontWeight:700, color:C.text }}>{loggedUser}</div>
              <div style={{ fontSize:10, color:C.muted }}>logada agora</div>
            </div>
          </div>

          <button onClick={() => setDk(!dk)} style={{ width:"100%", padding:"4px", background:"none", border:`1px solid ${C.border}`, borderRadius:4, color:C.muted, fontSize:11, cursor:"pointer", marginBottom:4 }}>
            {dk ? "☀️ Modo claro" : "🌙 Modo escuro"}
          </button>

          {/* Botão Sair */}
          <button onClick={handleLogout} style={{ width:"100%", padding:"6px", background:C.redBg, border:`1px solid ${C.red}30`, borderRadius:6, color:C.red, fontSize:12, fontWeight:700, cursor:"pointer" }}>
            🚪 Sair
          </button>
        </div>
      </div>

      {/* ── Conteúdo principal ── */}
      <div style={{ flex:1, padding:"18px 22px", overflowY:"auto" }}>
        {view==="dashboard" && <DashboardView/>}
        {view==="tasks"     && <TasksView/>}
        {view==="procs"     && <ProcessosView/>}
        {view==="movs"      && <MovimentacoesView/>}
        {view==="log"       && <AccessLogView/>}
      </div>

      {/* Toast */}
      {toast && (
        <div style={{ position:"fixed", bottom:18, left:"50%", transform:"translateX(-50%)", background:C.green, color:"#fff", padding:"8px 20px", borderRadius:8, fontSize:12, fontWeight:700, zIndex:100 }}>
          {toast}
        </div>
      )}
    </div>
  );
}

    // Inicializa o React
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
