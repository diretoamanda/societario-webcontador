          <p style={{ fontSize: 14, color: C.textMuted, marginTop: 3 }}>{userFilterMode ? <><span style={{ color: C.accent, fontWeight: 600 }}>{activeUser}</span> — processos ativos</> : "Visão geral — todos os processos"}</p>
        </div>
        <div style={{ display: "flex", gap: 7, flexWrap: "wrap" }}>
          <button className="bg" onClick={() => setUserFilterMode(m => !m)} style={userFilterMode ? { borderColor: C.accent, color: C.accent } : {}}><Filter size={13} />{userFilterMode ? activeUser : "Filtrar"}</button>
          {myAlerts.length > 0 && <button className="bd" onClick={() => setShowAlerts(true)}><AlertTriangle size={13} />{myAlerts.length} alerta{myAlerts.length > 1 ? "s" : ""}</button>}
          {canExportDyn(activeUser) && <button className="bg" onClick={() => setShowReportModal(true)}><Download size={13} />Relatório HTML</button>}
          {canExportDyn(activeUser) && <button className="bg" onClick={() => setShowExport(true)}><FileSpreadsheet size={13} />Exportar</button>}
          {canCreateDyn(activeUser) && <button className="bp" onClick={() => setModal(true)}><Plus size={13} />Novo</button>}
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(150px,1fr))", gap: 12, marginBottom: 22 }}>
        {[
          { key: "active",    label: "Em Andamento",   value: userFilterMode ? kpi.myActive : kpi.active, color: "#3b82f6", icon: "⚡" },
          { key: "completed", label: "Concluídos",      value: kpi.completed, color: "#16a34a", icon: "✅" },
          { key: "late",      label: "Etapas Atrasadas",value: kpi.late,      color: "#dc2626", icon: "🚨" },
          { key: "chase",     label: "Cobrar Cliente",  value: kpi.chase,     color: "#d97706", icon: "⏰" },
        ].map((k, i) => (
          <div key={i} onClick={() => k.value > 0 && setKpiModal(k.key)}
            style={{ background: C.card, border: `2px solid ${kpiModal === k.key ? k.color : C.border}`, borderRadius: 12, padding: "16px 18px", cursor: k.value > 0 ? "pointer" : "default", transition: "border-color .15s, transform .1s", transform: kpiModal === k.key ? "scale(1.03)" : "scale(1)" }}>
            <div style={{ fontSize: 20, marginBottom: 6 }}>{k.icon}</div>
            <div style={{ fontSize: 32, fontWeight: 800, color: k.color, fontFamily: "DM Mono", lineHeight: 1 }}>{k.value}</div>
            <div style={{ fontSize: 16, color: C.text, marginTop: 5, fontWeight: 600 }}>{k.label}</div>
            {k.value > 0 && <div style={{ fontSize: 14, color: k.color, marginTop: 3, opacity: .7 }}>clique para ver ↓</div>}
          </div>
        ))}
      </div>

      {/* ── BADGE FORMULÁRIOS PENDENTES ────────────────── */}
      {!isEstagiarioDyn(activeUser) && pendingForms.length > 0 && (
        <div onClick={() => setView("forms")} style={{ background: darkMode ? "#1a2332" : "#eff6ff", border: `2px solid ${darkMode ? "#1e40af" : "#93c5fd"}`, borderRadius: 12, padding: "14px 20px", marginBottom: 20, cursor: "pointer", display: "flex", alignItems: "center", gap: 12, transition: "transform .1s" }} className="rh">
          <span style={{ fontSize: 24 }}>📋</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: C.text }}>{pendingForms.length} formulário{pendingForms.length > 1 ? "s" : ""} pendente{pendingForms.length > 1 ? "s" : ""}</div>
            <div style={{ fontSize: 13, color: C.textMuted }}>Formulários de abertura enviados por clientes — clique para revisar</div>
          </div>
          <span style={{ background: "#3b82f6", color: "#fff", fontSize: 18, fontWeight: 800, padding: "4px 12px", borderRadius: 10, fontFamily: "DM Mono" }}>{pendingForms.length}</span>
        </div>
      )}

      {/* ── PAINEL KPI EXPANDIDO ─────────────────────────── */}
      {kpiModal && (
        <div style={{ background: C.card, border: `1px solid ${kpiModal === "late" ? C.alertBorder : kpiModal === "chase" ? C.warnBorder : C.border}`, borderRadius: 12, marginBottom: 20, overflow: "hidden" }}>
          <div style={{ padding: "12px 18px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 15, fontWeight: 700, color: kpiModal === "late" ? C.alertText : kpiModal === "chase" ? C.warnText : C.accent }}>
              {kpiModal === "late" && `🚨 Etapas Atrasadas (${lateAlerts.length})`}
              {kpiModal === "chase" && `⏰ Cobrar Cliente — vence em ≤2 dias (${chaseAlerts.length})`}
              {kpiModal === "active" && `⚡ Processos em Andamento (${kpi.active})`}
              {kpiModal === "completed" && `✅ Processos Concluídos (${kpi.completed})`}
            </span>
            <button onClick={() => setKpiModal(null)} style={{ background: "none", border: "none", color: C.textMuted, fontSize: 18, lineHeight: 1 }}>×</button>
          </div>
          <div style={{ maxHeight: 320, overflowY: "auto" }}>
            {(kpiModal === "late" ? lateAlerts : kpiModal === "chase" ? chaseAlerts : []).map((a, i) => (
              <div key={i} onClick={() => { openDetail(a.procId); setKpiModal(null); }}
                style={{ padding: "10px 18px", borderBottom: `1px solid ${C.border}`, cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}
                className="rh">
                <div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>{a.clientName}</div>
                  <div style={{ fontSize: 14, color: C.textMuted }}>Et.{a.stepIndex+1}: {a.name} · <span style={{ color: C.textMuted }}>{a.responsible}</span></div>
                </div>
                {a.st === "late"
                  ? <span style={{ background: C.alertBg, border: `1px solid ${C.alertBorder}`, color: C.alertText, padding: "3px 9px", borderRadius: 6, fontSize: 14, fontWeight: 700, fontFamily: "DM Mono", flexShrink: 0 }}>{a.daysLate}d</span>
                  : <span style={{ background: C.warnBg, border: `1px solid ${C.warnBorder}`, color: C.warnText, padding: "3px 9px", borderRadius: 6, fontSize: 14, fontWeight: 700, flexShrink: 0 }}>⏰ cobrar</span>}
              </div>
            ))}
            {(kpiModal === "active" || kpiModal === "completed") && procs.filter(p => p.status === (kpiModal === "active" ? "active" : "completed")).map((p, i) => (
              <div key={i} onClick={() => { openDetail(p.id); setKpiModal(null); }}
                style={{ padding: "10px 18px", borderBottom: `1px solid ${C.border}`, cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}
                className="rh">
                <div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>{p.clientName}</div>
                  <div style={{ fontSize: 14, color: C.textMuted }}>{p.responsible} · {fmtForecast(p)}</div>
                </div>
                <span style={{ fontSize: 14, color: C.textMuted, fontFamily: "DM Mono" }}>{getPct(p)}%</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        {/* Processos por Tipo - clicável */}
        <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, overflow: "hidden" }}>
          <div style={{ padding: "14px 18px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <h2 style={{ fontSize: 16, fontWeight: 700 }}>Processos por Tipo</h2>
            <button onClick={() => setView("list")} style={{ fontSize: 14, color: C.accent, background: "none", border: "none" }}>Ver todos →</button>
          </div>
          {Object.entries(templates).map(([k, t]) => {
            const cnt = procs.filter(p => p.type === k && p.status === "active").length;
            const lateCnt = procs.filter(p => p.type === k && p.status === "active").reduce((acc, p) => acc + getLateSteps(p).length, 0);
            return (
              <div key={k} className="rh" onClick={() => { setFType(k); setFStatus("active"); setView("list"); }}
                style={{ padding: "14px 18px", borderBottom: `1px solid ${C.border}`, cursor: "pointer", display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ fontSize: 24 }}>{t.icon}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 16, fontWeight: 600, color: C.text }}>{t.label}</div>
                  <div style={{ fontSize: 14, color: C.textMuted }}>{cnt} ativo{cnt !== 1 ? "s" : ""}{lateCnt > 0 ? ` · ${lateCnt} atraso${lateCnt !== 1 ? "s" : ""}` : ""}</div>
                </div>
                <div style={{ fontSize: 28, fontWeight: 800, color: t.color, fontFamily: "DM Mono" }}>{cnt}</div>
                {lateCnt > 0 && <span style={{ fontSize: 14, color: C.alertText, fontWeight: 700, background: C.alertBg, border: `1px solid ${C.alertBorder}`, padding: "2px 8px", borderRadius: 5 }}>🚨 {lateCnt}</span>}
              </div>
            );
          })}
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          {/* By user — totals only, click to filter */}
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, overflow: "hidden" }}>
            <div style={{ padding: "12px 16px", borderBottom: `1px solid ${C.border}` }}>
              <h2 style={{ fontSize: 16, fontWeight: 700 }}>Por Responsável</h2>
              <span style={{ fontSize: 13, color: C.textMuted }}>Clique para ver os processos</span>
            </div>
            {USERS.filter(u => !blockedUsers.includes(u)).map(u => {
              const up = procs.filter(p => p.responsible === u && p.status === "active");
              const ul = up.reduce((acc, p) => acc + getLateSteps(p).length, 0);
              const uc = up.flatMap(p => p.steps).filter(s => isClientChaseNeeded(s)).length;
              const avatarBg = { Amanda: "#3b82f6", Ricardo: "#3b82f6", Sabrina: "#8b5cf6", Fernanda: "#06b6d4", Gabriela: "#10b981", Yasmin: "#f59e0b" }[u] || C.accent;
              if (up.length === 0) return null;
              return (
                <div key={u} className="rh" onClick={() => { setActiveUser(u); setUserFilterMode(true); setFStatus("active"); setView("list"); }}
                  style={{ padding: "11px 16px", borderBottom: `1px solid ${C.border}`, display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }}>
                  <div style={{ width: 32, height: 32, borderRadius: "50%", background: avatarBg, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, color: "#fff", fontSize: 14, flexShrink: 0 }}>{u[0]}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>{u}</div>
                    <div style={{ fontSize: 13, color: C.textMuted }}>{USER_META[u]?.role}</div>
                  </div>
                  <div style={{ fontSize: 22, fontWeight: 800, color: C.accent, fontFamily: "DM Mono", marginRight: 4 }}>{up.length}</div>
                  {ul > 0 && <span style={{ fontSize: 12, background: C.alertBg, color: C.alertText, border: `1px solid ${C.alertBorder}`, padding: "2px 7px", borderRadius: 5, fontWeight: 700 }}>🚨{ul}</span>}
                  {uc > 0 && <span style={{ fontSize: 12, background: C.warnBg, color: C.warnText, border: `1px solid ${C.warnBorder}`, padding: "2px 7px", borderRadius: 5, fontWeight: 700 }}>⏰{uc}</span>}
                </div>
              );
            })}
          </div>

          {/* Chase + Late alerts panel */}
          {(chaseAlerts.length > 0 || lateAlerts.length > 0) && (
            <div style={{ background: C.alertBg, border: `1px solid ${C.alertBorder}`, borderRadius: 12, overflow: "hidden" }}>
              <div style={{ padding: "11px 14px", borderBottom: `1px solid ${C.alertBorder}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontSize: 14, fontWeight: 600, color: C.alertText }}>🚨 {lateAlerts.length} atraso{lateAlerts.length !== 1 ? "s" : ""} {chaseAlerts.length > 0 ? `· ⏰ ${chaseAlerts.length} cobrar cliente` : ""}</span>
                <button onClick={() => setShowReportModal(true)} style={{ background: "none", border: `1px solid ${C.alertBorder}`, color: C.alertText, padding: "3px 8px", borderRadius: 5, fontSize: 14, display: "flex", alignItems: "center", gap: 3 }}><Download size={10} /> Relatório</button>
              </div>
              <div style={{ maxHeight: 180, overflowY: "auto" }}>
                {[...lateAlerts.slice(0, 4), ...chaseAlerts.slice(0, 2)].map((a, i) => (
                  <div key={i} style={{ padding: "8px 14px", borderBottom: `1px solid ${darkMode ? "#2d0a0a" : "#fecaca"}`, display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }} onClick={() => openDetail(a.procId)}>
                    <div>
                      <div style={{ fontSize: 14, color: C.alertText, fontWeight: 600 }}>{a.clientName}</div>
                      <div style={{ fontSize: 14, color: darkMode ? "#ef4444" : "#b91c1c" }}>Et.{a.stepIndex + 1}: {a.name}</div>
                    </div>
                    {a.st === "late" ? <span style={{ fontSize: 14, color: C.alertText, fontFamily: "DM Mono", fontWeight: 700, flexShrink: 0 }}>{a.daysLate}d</span> : <span className="chase">⏰ cobrar</span>}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ── POSITION ALERT — atraso ≥5 DU: dar posição ao cliente ──── */}
          {positionProcIds.length > 0 && (
            <div style={{ background: darkMode ? "#1c0f00" : "#fff7ed", border: `2px solid #ea580c`, borderRadius: 12, overflow: "hidden" }}>
              <div style={{ padding: "11px 14px", borderBottom: `1px solid ${darkMode ? "#7c2d12" : "#fed7aa"}`, display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 16 }}>📞</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: "#ea580c" }}>
                    {positionProcIds.length} processo{positionProcIds.length > 1 ? "s" : ""} com atraso crítico ≥{POSITION_DU_THRESHOLD} DU
                  </div>
                  <div style={{ fontSize: 12, color: darkMode ? "#fdba74" : "#9a3412", marginTop: 2, fontStyle: "italic" }}>
                    dar posição do atraso ao cliente e registrar contato via WhatsApp na etapa
                  </div>
                </div>
              </div>
              <div style={{ maxHeight: 180, overflowY: "auto" }}>
                {positionProcIds.map(pid => {
                  const procCases = positionAlerts.filter(a => a.procId === pid);
                  const worst = procCases.reduce((a, b) => a.daysLate > b.daysLate ? a : b);
                  return (
                    <div key={pid} style={{ padding: "8px 14px", borderBottom: `1px solid ${darkMode ? "#431407" : "#fed7aa"}`, display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }} onClick={() => openDetail(pid)}>
                      <div>
                        <div style={{ fontSize: 14, color: "#ea580c", fontWeight: 600 }}>{worst.clientName}</div>
                        <div style={{ fontSize: 12, color: darkMode ? "#fdba74" : "#9a3412" }}>Et.{worst.stepIndex + 1}: {worst.name}</div>
                      </div>
                      <span style={{ fontSize: 13, color: "#ea580c", fontFamily: "DM Mono", fontWeight: 700, flexShrink: 0 }}>{worst.daysLate} DU</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* ════════════ CALENDÁRIO DE CONCLUSÕES PREVISTAS ════════════ */}
      {(() => {
        const y = calMonth.year, m = calMonth.month;
        const firstDay = new Date(y, m, 1).getDay(); // 0=Sun
        const daysInMonth = new Date(y, m + 1, 0).getDate();
        const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
        const dias = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
        const todayD = todayStr();
        const prevM = () => setCalMonth(p => p.month === 0 ? { year: p.year - 1, month: 11 } : { ...p, month: p.month - 1 });
        const nextM = () => setCalMonth(p => p.month === 11 ? { year: p.year + 1, month: 0 } : { ...p, month: p.month + 1 });
        const goToday = () => { const d = new Date(); setCalMonth({ year: d.getFullYear(), month: d.getMonth() }); };

        // Build forecast map: dateStr → [{procId, clientName, pct, hasLate, type}]
        const forecastMap = {};
        procs.filter(p => p.status === "active").forEach(p => {
          const fd = calcForecast(p);
          if (!fd) return;
          const ds = fd.toISOString().split("T")[0];
          if (!forecastMap[ds]) forecastMap[ds] = [];
          const hasLate = getLateSteps(p).length > 0;
          const pct = getPct(p);
          const tpl = templates[p.type] || DEFAULT_TEMPLATES.alteracao;
          forecastMap[ds].push({ procId: p.id, name: p.clientName, pct, hasLate, icon: tpl.icon, color: tpl.color, responsible: p.responsible });
        });
        // Completed processes — distinguish within vs over deadline
        procs.filter(p => p.status === "completed").forEach(p => {
          const lastStep = [...p.steps].reverse().find(s => s.completedAt);
          if (!lastStep) return;
          const ds = lastStep.completedAt;
          if (!forecastMap[ds]) forecastMap[ds] = [];
          const tpl = templates[p.type] || DEFAULT_TEMPLATES.alteracao;
          const r = calcCompletedDU(p);
          const withinDeadline = r ? r.withinDeadline : true;
          const duLabel = r ? `${r.actualDU} DU` : "";
          forecastMap[ds].push({
            procId: p.id, name: p.clientName, pct: 100, hasLate: false,
            icon: withinDeadline ? "✅" : "⚠️",
            color: withinDeadline ? "#16a34a" : "#d97706",
            responsible: p.responsible, done: true, withinDeadline, duLabel,
            title: withinDeadline
              ? `✅ Concluído dentro do prazo — ${duLabel}`
              : `⚠️ Concluído acima do prazo ideal — ${duLabel}`,
          });
        });
        // Chase deadline events — when to call clients
        procs.filter(p => p.status === "active").forEach(p => {
          p.steps.forEach((s, si) => {
            if (!s.clientDependent || s.completedAt || s.skipped || !s.activatedAt) return;
            const dl = getChaseDeadline(s);
            if (!dl) return;
            if (!forecastMap[dl]) forecastMap[dl] = [];
            forecastMap[dl].push({ procId: p.id, name: p.clientName, stepIdx: si, stepName: s.name, icon: "⏰", color: "#d97706", responsible: p.responsible, isChase: true, chaseCount: (s.chaseLog || []).length });
          });
        });
        /* ── EVENTOS DE CONTATO — ≥5 DU de atraso ──────────────────────
           Calcula o dia em que cada etapa cruzou o limiar de 5 DU e insere
           um evento 📞 CONTATO nessa data. A data prevista de conclusão
           permanece separada, preservando sua condição original.          */
        procs.filter(p => p.status === "active").forEach(p => {
          const seenProc = new Set();
          p.steps.forEach((s, si) => {
            if (s.completedAt || s.skipped || !s.activatedAt) return;
            if (stepStatus(s) !== "late") return;
            if (isStaleStep(s, si, p.steps)) return;
            const dl = effectiveDeadline(s);
            const maxAge = businessDaysDiff(p.startDate || s.activatedAt, todayStr());
            const daysLate = Math.min(businessDaysDiff(dl, todayStr()), Math.max(maxAge, 0));
            if (daysLate < POSITION_DU_THRESHOLD) return;
            /* Data em que cruzou o limiar — um evento por processo por dia */
            const contactDate = addBusinessDays(dl, POSITION_DU_THRESHOLD);
            if (seenProc.has(contactDate)) return;
            seenProc.add(contactDate);
            if (!forecastMap[contactDate]) forecastMap[contactDate] = [];
            /* Evita duplicatas caso múltiplas etapas do mesmo processo cruzem no mesmo dia */
            if (!forecastMap[contactDate].some(e => e.procId === p.id && e.isPosition)) {
              const tpl = templates[p.type] || DEFAULT_TEMPLATES.alteracao;
              forecastMap[contactDate].push({
                procId: p.id, name: p.clientName, icon: "📞", color: "#ea580c",
                responsible: p.responsible, isPosition: true,
                stepName: s.name, stepIdx: si, daysLate, tplIcon: tpl.icon,
              });
            }
          });
        });

        // Count forecasts this month
        let thisMonthCount = 0;
        for (let d = 1; d <= daysInMonth; d++) {
          const ds = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
          if (forecastMap[ds]) thisMonthCount += forecastMap[ds].length;
        }

        const cells = [];
        for (let i = 0; i < firstDay; i++) cells.push(null); // empty before 1st
        for (let d = 1; d <= daysInMonth; d++) cells.push(d);
        while (cells.length % 7 !== 0) cells.push(null); // fill end

        return (
          <div style={{ marginTop: 20, background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, overflow: "hidden" }}>
            <div style={{ padding: "14px 18px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
              <div>
                <h2 style={{ fontSize: 16, fontWeight: 700 }}>📅 Calendário de Conclusões Previstas</h2>
                <p style={{ fontSize: 13, color: C.textMuted, marginTop: 2 }}>{thisMonthCount} processo{thisMonthCount !== 1 ? "s" : ""} com previsão em {meses[m]}</p>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <button onClick={prevM} style={{ background: "none", border: `1px solid ${C.border}`, color: C.textMuted, width: 30, height: 30, borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>‹</button>
                <button onClick={goToday} style={{ background: C.accentMuted, border: `1px solid ${C.accent}33`, color: C.accent, padding: "4px 12px", borderRadius: 6, fontSize: 13, fontWeight: 600 }}>{meses[m]} {y}</button>
                <button onClick={nextM} style={{ background: "none", border: `1px solid ${C.border}`, color: C.textMuted, width: 30, height: 30, borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>›</button>
              </div>
            </div>
            <div style={{ padding: "8px 12px 12px" }}>
              {/* Header */}
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2, marginBottom: 4 }}>
                {dias.map(d => <div key={d} style={{ textAlign: "center", fontSize: 11, fontWeight: 700, color: C.textMuted, padding: "4px 0", textTransform: "uppercase", letterSpacing: ".06em" }}>{d}</div>)}
              </div>
              {/* Days grid */}
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2 }}>
                {cells.map((day, ci) => {
                  if (day === null) return <div key={`e${ci}`} style={{ minHeight: 60 }} />;
                  const ds = `${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
                  const isToday = ds === todayD;
                  const isPast = ds < todayD;
                  const entries = forecastMap[ds] || [];
                  const hasLateEntry = entries.some(e => e.hasLate);
                  const isWeekend = ci % 7 === 0 || ci % 7 === 6;
                  return (
                    <div key={ci} style={{
                      minHeight: 60, borderRadius: 6, padding: "3px 4px", position: "relative",
                      background: isToday ? (darkMode ? "#1e3a5f" : "#dbeafe") : entries.length > 0 ? (darkMode ? "#111827" : "#f8fafc") : "transparent",
                      border: isToday ? `2px solid ${C.accent}` : entries.length > 0 ? `1px solid ${C.border}` : `1px solid transparent`,

            const realDates = applicable.filter(st => st.completedAt && !st.imported && st.completedAt >= TL_START).map(st => st.completedAt).sort();

          const fc = fmtForecast(p);
          /* Maior atraso em DU entre as etapas realmente atrasadas */
          const maxDelayDU = hasLate ? Math.max(...lateList.map(s => {
            const raw = businessDaysDiff(effectiveDeadline(s), todayStr());
            return Math.min(raw, Math.max(businessDaysDiff(p.startDate, todayStr()), 0));
          })) : 0;
          const isCompleted = p.status === "completed";
          const completedR = isCompleted ? calcCompletedDU(p) : null;
          return (
            <div key={p.id} className="rh" onClick={() => openDetail(p.id)} style={{ display: "grid", gridTemplateColumns: "44px 78px 1fr 80px 55px 75px 140px", gap: "0 10px", padding: "11px 16px", borderBottom: `1px solid ${C.border}`, cursor: "pointer", alignItems: "center" }}>
              <div style={{ fontSize: 12, color: C.textMuted, fontFamily: "DM Mono" }}>{p.id}</div>
              <div><TypeTag type={p.type} small /></div>
              <div style={{ overflow: "hidden" }}><div style={{ fontSize: 14, fontWeight: 600, lineHeight: 1.3, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{p.clientName}</div><div style={{ fontSize: 12, color: C.textMuted, marginTop: 1, display: "flex", gap: 5, alignItems: "center" }}>{p.socio || ""}{hasChase && !hasLate && <span className="chase">⏰</span>}</div></div>
              <div>{(() => { const cat = migrateCategory(p); const cc = CATEGORY_COLORS[cat]; return <span style={{ fontSize: 11, fontWeight: 700, padding: "2px 6px", borderRadius: 4, color: cc.fg, background: darkMode ? cc.bg_d : cc.bg_l, border: `1px solid ${cc.fg}33`, whiteSpace: "nowrap" }}>{CATEGORY_ICONS[cat]} {cat === "prudential" ? "Prud." : cat === "corretora" ? "Corret." : "Outros"}</span>; })()}</div>
              <div style={{ fontSize: 12 }}>{p.responsible}</div>
              <div style={{ display: "flex", alignItems: "center", gap: 3 }}>
                <div style={{ flex: 1, height: 4, background: C.border, borderRadius: 4, overflow: "hidden" }}><div style={{ width: pct + "%", height: "100%", background: C.accent, borderRadius: 4 }} /></div>
                <span style={{ fontSize: 11, color: C.textMuted, fontFamily: "DM Mono" }}>{pct}%</span>
              </div>
              <div style={{ fontSize: 11, fontWeight: 500, lineHeight: 1.35 }}>
                {hasLate
                  ? <span style={{ color: C.alertText, fontWeight: 700, fontFamily: "DM Mono" }}>🚨 {maxDelayDU} DU atraso</span>
                  : isCompleted && completedR
                    ? <span style={{ color: completedR.withinDeadline ? "#16a34a" : "#d97706", fontWeight: 600 }}>
                        {completedR.withinDeadline ? "✅" : "⚠️"} {completedR.actualDU} DU
                        <div style={{ fontSize: 10, fontWeight: 400, opacity: .8 }}>{completedR.withinDeadline ? "dentro do prazo" : "acima do prazo"}</div>
                      </span>
                    : <span style={{ color: C.textMuted, fontFamily: "DM Mono" }}>{fc}</span>
                }
              </div>
            </div>
          );
        })}
      </div>
      <div style={{ marginTop: 7, fontSize: 14, color: C.textMuted }}>{displayedProcs.length} processo{displayedProcs.length !== 1 ? "s" : ""} exibidos</div>
      <div style={{ marginTop: 8, padding: "10px 14px", background: C.cardAlt, border: `1px solid ${C.border}`, borderRadius: 8, display: "flex", gap: 14, flexWrap: "wrap", alignItems: "flex-start" }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, textTransform: "uppercase", letterSpacing: ".05em", paddingTop: 1, flexShrink: 0 }}>Legenda</span>
        {[
          { color: "#dc2626", mono: true,  badge: "🚨 X DU atraso",             desc: "Investigar o atraso na etapa — prazo individual vencido" },
          { color: "#ea580c", mono: false, badge: "📞 X DU",                     desc: "Dar posição ao cliente via WhatsApp — etapa ≥5 DU em atraso" },
          { color: "#d97706", mono: false, badge: "⏰ cobrar",                   desc: "Cobrar cliente na etapa — etapa dependente do cliente com prazo próximo" },
          { color: C.textMuted, mono: true, badge: "X DU · DD/MM",              desc: "Dias úteis restantes / data fim estimada do processo" },
          { color: "#16a34a", mono: true,  badge: "✅ X DU",                     desc: "Concluído dentro do prazo" },
          { color: "#d97706", mono: true,  badge: "⚠️ X DU",                    desc: "Concluído acima do prazo ideal" },
        ].map((l, i) => (
          <span key={i} style={{ fontSize: 11, display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ fontFamily: l.mono ? "DM Mono" : "inherit", fontWeight: 700, color: l.color, whiteSpace: "nowrap" }}>{l.badge}</span>
            <span style={{ color: C.textMuted }}>— {l.desc}</span>
          </span>
        ))}
      </div>
    </div>
  );

  /* ════════════ PROCESS DETAIL ════════════ */
  const ProcDetail = () => {
    if (!sel) return null;
    const tpl = templates[sel.type] || DEFAULT_TEMPLATES.alteracao;
    const pct = getPct(sel); const completedCount = sel.steps.filter(s => s.completedAt).length;
    const hasLate = getLateSteps(sel).length > 0;
    const st = sel.status === "completed" ? "done" : hasLate ? "late" : "active";
    const lateSteps = getLateSteps(sel);
    const chaseSteps = sel.steps.filter((s, i) => !isStaleStep(s, i, sel.steps) && isClientChaseNeeded(s));
    const forecast = fmtForecast(sel);
    return (
      <div style={{ paddingBottom: 60 }}>
        <button onClick={() => setView("list")} style={{ display: "flex", alignItems: "center", gap: 5, background: "none", border: "none", color: C.textMuted, fontSize: 14, marginBottom: 16, padding: 0 }}><ArrowLeft size={13} />Voltar</button>
        {/* Header */}
        <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "18px 22px", marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 10, marginBottom: 11 }}>
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 7, flexWrap: "wrap" }}>
                <span style={{ fontSize: 22 }}>{tpl.icon}</span>
                <EditableField procId={sel.id} field="clientName" value={sel.clientName} />
                {sel.status === "active" && canDeleteDyn(activeUser) && <button onClick={() => { setArchiveModal(sel); setArchiveReason(""); }} style={{ fontSize: 14, background: darkMode ? "#1c1409" : "#fffbeb", border: "1px solid #92400e55", color: "#92400e", padding: "4px 10px", borderRadius: 6, display: "flex", alignItems: "center", gap: 4 }}>📦 Arquivar</button>}
                {sel.status === "active" && canDeleteDyn(activeUser) && <button onClick={() => setDeleteModal(sel)} style={{ fontSize: 14, background: C.alertBg, border: "1px solid " + C.alertBorder, color: C.alertText, padding: "4px 10px", borderRadius: 6, display: "flex", alignItems: "center", gap: 4 }}><Trash2 size={12} />Excluir</button>}
                {sel.status === "archived" && <span style={{ fontSize: 14, background: darkMode ? "#1c1409" : "#fef9c3", color: "#92400e", padding: "4px 10px", borderRadius: 6, fontWeight: 700 }}>📦 ARQUIVADO{sel.archivedAt ? ` em ${fmtDate(sel.archivedAt)}` : ""}</span>}
                {sel.status === "archived" && canDeleteDyn(activeUser) && <button onClick={() => reactivateProcess(sel.id)} className="bp" style={{ fontSize: 14, padding: "4px 10px" }}><RotateCcw size={12} /> Reativar</button>}
                {(() => { const cat = migrateCategory(sel); const cc = CATEGORY_COLORS[cat]; return <span style={{ fontSize: 14, background: darkMode ? cc.bg_d : cc.bg_l, color: cc.fg, border: "1px solid " + cc.fg, padding: "2px 8px", borderRadius: 4, fontWeight: 600 }}>{CATEGORY_ICONS[cat]} {CATEGORY_LABELS[cat]}</span>; })()}
              </div>
              <div style={{ display: "flex", gap: 12, flexWrap: "wrap", fontSize: 14, color: C.textMuted, alignItems: "center" }}>
                <span>{tpl.label}</span>
                <span>CNPJ: <EditableField procId={sel.id} field="cnpj" value={sel.cnpj} mono /></span>
                <span>Sócio: <EditableField procId={sel.id} field="socio" value={sel.socio} /></span>
                {(() => { const tel = sel.tel || (clientBase.find(c => c.name === sel.clientName) || {}).tel; return tel ? <span style={{ display: "flex", alignItems: "center", gap: 4 }}>📞 <a href={`tel:${tel.replace(/\s/g,"")}`} style={{ color: C.accent, textDecoration: "none", fontFamily: "DM Mono", fontSize: 14 }}>{tel}</a></span> : null; })()}
                {(() => {
                  const em = sel.email || (clientBase.find(c => c.name === sel.clientName) || {}).email || "";
                  if (editField?.procId === sel.id && editField?.field === "email") {
                    return <span style={{ display: "flex", alignItems: "center", gap: 4 }}>✉
                      <input value={editValue} onChange={e => setEditValue(e.target.value)} placeholder="email@empresa.com" type="email" style={{ border: `1px solid ${C.accent}`, borderRadius: 5, padding: "2px 8px", fontSize: 13, background: C.inputBg, color: C.text, width: 200 }} autoFocus onKeyDown={e => { if (e.key === "Enter") saveEdit(); if (e.key === "Escape") setEditField(null); }} />
                      <button onClick={saveEdit} style={{ background: "none", border: `1px solid ${C.accent}`, color: C.accent, padding: "2px 6px", borderRadius: 4, fontSize: 14 }}><Check size={9} /></button>
                      <button onClick={() => setEditField(null)} style={{ background: "none", border: "none", color: C.textMuted, padding: 2 }}><X size={10} /></button>
                    </span>;
                  }
                  return em
                    ? <span style={{ display: "flex", alignItems: "center", gap: 4, cursor: "pointer" }} onClick={() => canEditDyn(activeUser) && startEdit(sel.id, "email", em)}>✉ <a href={`mailto:${em}`} onClick={e => e.stopPropagation()} style={{ color: C.accent, textDecoration: "none", fontSize: 13 }}>{em}</a>{canEditDyn(activeUser) && <Edit2 size={8} color={C.textMuted} style={{ opacity: .4 }} />}</span>
                    : canEditDyn(activeUser) ? <span onClick={() => startEdit(sel.id, "email", "")} style={{ display: "flex", alignItems: "center", gap: 3, cursor: "pointer", color: C.textDim, fontSize: 13, opacity: .6 }}>✉ adicionar email <Edit2 size={8} /></span> : null;
                })()}
                <span style={{ display: "flex", alignItems: "center", gap: 3 }}>Resp.:
                  {editField?.procId === sel.id && editField?.field === "responsible" ? (
                    <span style={{ display: "flex", gap: 4 }}>
                      <select value={editValue} onChange={e => setEditValue(e.target.value)} style={{ border: `1px solid ${C.accent}`, borderRadius: 5, padding: "2px 6px", fontSize: 14, background: C.inputBg, color: C.text }}>{USERS.map(u => <option key={u}>{u}</option>)}</select>
                      <button onClick={saveEdit} style={{ background: "none", border: `1px solid ${C.accent}`, color: C.accent, padding: "2px 6px", borderRadius: 4, fontSize: 14 }}><Check size={9} /></button>
                      <button onClick={() => setEditField(null)} style={{ background: "none", border: "none", color: C.textMuted, padding: 2 }}><X size={10} /></button>
                    </span>
                  ) : <span style={{ cursor: "pointer", color: C.text, display: "flex", alignItems: "center", gap: 2 }} onClick={() => startEdit(sel.id, "responsible", sel.responsible)}>{sel.responsible}<Edit2 size={9} color={C.textMuted} style={{ opacity: .4 }} /></span>}
                </span>
                <span>📅 {fmtDate(sel.startDate)}</span>
                <span style={{ fontFamily: "DM Mono", fontSize: 13 }}>{sel.id}</span>
              </div>
            </div>
            <div style={{ textAlign: "right", flexShrink: 0 }}>
              <div style={{ display: "flex", alignItems: "baseline", gap: 8, justifyContent: "flex-end" }}>
                <div style={{ fontSize: 30, fontWeight: 800, color: hasLate ? "#dc2626" : pct === 100 ? "#16a34a" : C.accent, fontFamily: "DM Mono", lineHeight: 1 }}>{pct}%</div>
                <div style={{ fontSize: 16, fontWeight: 700, color: hasLate ? C.alertText : pct === 100 ? "#16a34a" : C.text, lineHeight: 1 }}>
                  {sel.status === "completed" && calcCompletedDU(sel)
                    ? (() => { const r = calcCompletedDU(sel); return <span style={{ color: r.withinDeadline ? "#16a34a" : "#d97706" }}>{r.withinDeadline ? "✅" : "⚠️"} {r.actualDU} DU</span>; })()
                    : <span>📅 {forecast}</span>
                  }
                </div>
              </div>
              <div style={{ fontSize: 13, color: C.textMuted, marginTop: 4 }}>{completedCount}/{sel.steps.length} etapas{sel.steps.some(s => s.custom) ? ` (${sel.steps.filter(s => s.custom).length} individual)` : ""}</div>
              {sel.steps.some(s => s.custom && !s.completedAt && !s.skipped) && (
                <div style={{ fontSize: 12, marginTop: 3, padding: "2px 8px", background: darkMode ? "#1c1409" : "#fef3c7", border: `1px solid ${C.warnBorder}`, borderRadius: 4, color: C.warnText, fontWeight: 600, display: "inline-block" }}>⏳ Etapa individual pendente</div>
              )}
            </div>
          </div>
          <div style={{ height: 5, background: C.border, borderRadius: 5, overflow: "hidden", marginBottom: 11 }}>
            <div style={{ width: pct + "%", height: "100%", background: `linear-gradient(90deg,${C.accent},#60a5fa)`, borderRadius: 5, transition: "width .5s" }} />
          </div>
          {chaseSteps.length > 0 && (
            <div style={{ padding: "9px 12px", background: C.warnBg, border: `1px solid ${C.warnBorder}`, borderRadius: 8, marginBottom: 10, fontSize: 14, color: C.warnText, fontWeight: 500, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
              <span>⏰ <strong>{chaseSteps.length} etapa{chaseSteps.length > 1 ? "s" : ""} dependendo do cliente</strong> — prazo em ≤2 dias. {chaseSteps.map(s => s.name).join(" · ")}</span>
              {canEditDyn(activeUser) && <button onClick={() => { const idx = sel.steps.findIndex(s => isClientChaseNeeded(s)); if (idx >= 0) openChaseModal(sel.id, idx); }} style={{ background: "#d97706", color: "#fff", border: "none", padding: "4px 12px", borderRadius: 6, fontSize: 13, fontWeight: 700, whiteSpace: "nowrap" }}>Registrar Follow-up</button>}
            </div>
          )}

          {/* ── CARD ATRASO CRÍTICO ≥5 DU — dar posição ao cliente ──────── */}
          {(() => {
            const procPosition = positionAlerts.filter(a => a.procId === sel.id);
            if (!procPosition.length) return null;
            const worst = procPosition.reduce((a, b) => a.daysLate > b.daysLate ? a : b);
            return (
              <div style={{ padding: "12px 14px", background: darkMode ? "#1c0f00" : "#fff7ed", border: `2px solid #ea580c`, borderRadius: 10, marginBottom: 10 }}>
                <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
                  <span style={{ fontSize: 20, flexShrink: 0 }}>📞</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, fontWeight: 800, color: "#ea580c", marginBottom: 3 }}>
                      Atraso crítico — {worst.daysLate} DU em atraso
                    </div>
                    <div style={{ fontSize: 14, color: darkMode ? "#fdba74" : "#9a3412", fontWeight: 600, marginBottom: 6, lineHeight: 1.4 }}>
                      ⚠️ dar posição do atraso ao cliente e registrar contato via WhatsApp na etapa
                    </div>
                    {procPosition.length > 1 && (
                      <div style={{ fontSize: 12, color: darkMode ? "#fb923c" : "#c2410c", marginBottom: 6 }}>
                        {procPosition.length} etapas nesta condição: {procPosition.map(a => `Et.${a.stepIndex + 1}`).join(", ")}
                      </div>
                    )}
                    <div style={{ fontSize: 12, color: darkMode ? "#fdba74" : "#9a3412", opacity: .8 }}>
                      Após contato, registre uma observação na etapa correspondente usando o ícone 💬 ao lado dela.
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}
          <div style={{ marginBottom: lateSteps.length > 0 ? 10 : 0 }}>
            <div style={{ fontSize: 14, color: C.textMuted, fontWeight: 700, marginBottom: 5, textTransform: "uppercase", letterSpacing: ".05em" }}>📋 Observações</div>
            <textarea value={obsText} onChange={e => { setObsText(e.target.value); setObsChanged(true); }} placeholder="Observações sobre este processo..." rows={2} style={{ fontSize: 14 }} />
            {obsChanged && <button onClick={() => { saveObs(sel.id, obsText); setObsChanged(false); }} style={{ marginTop: 5, display: "flex", alignItems: "center", gap: 4, background: "none", border: "1px solid #16a34a", color: "#16a34a", padding: "4px 11px", borderRadius: 6, fontSize: 14, fontWeight: 600 }}><Save size={10} />Salvar</button>}
          </div>
          {canEditDyn(activeUser) && lateSteps.length > 0 && <div style={{ display: "flex", alignItems: "center", gap: 8 }}><button onClick={() => setEmailModal({ ...lateSteps[0], procId: sel.id, clientName: sel.clientName, stepIndex: sel.steps.indexOf(lateSteps[0]), responsible: sel.responsible, daysLate: businessDaysDiff(effectiveDeadline(lateSteps[0]), todayStr()) })} style={{ display: "flex", alignItems: "center", gap: 4, background: C.alertBg, border: `1px solid ${C.alertBorder}`, color: C.alertText, padding: "5px 11px", borderRadius: 6, fontSize: 14 }}><Mail size={11} />Enviar alerta</button><span style={{ fontSize: 14, color: C.alertText }}>{lateSteps.length} etapa{lateSteps.length > 1 ? "s" : ""} em atraso</span></div>}
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 290px", gap: 16 }}>
          {/* Steps */}
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, overflow: "hidden" }}>
            <div style={{ padding: "13px 16px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <h2 style={{ fontSize: 16, fontWeight: 700 }}>Etapas</h2>
              <button onClick={() => setAddingStep(sel.id)} style={{ display: "flex", alignItems: "center", gap: 4, background: "none", border: `1px solid ${C.border}`, color: C.textMuted, padding: "4px 9px", borderRadius: 6, fontSize: 14 }}><Plus size={10} />Adicionar</button>
            </div>
            {sel.steps.map((step, i) => {
              const ss = stepStatus(step);
              const dl = step.activatedAt ? effectiveDeadline(step) : null;
              /* DU com sinal: positivo = falta, negativo = vencido */
              const daysLeft = dl
                ? (dl >= todayStr() ? businessDaysDiff(todayStr(), dl) : -businessDaysDiff(dl, todayStr()))
                : null;
              const ssS = SS(ss);
              const borderL = ss === "active" ? C.accent : ss === "late" ? C.alertText : C.border;
              const chaseThis = isClientChaseNeeded(step);
              const noteEdit = editingStepNote?.stepIdx === i;
              const noteVal = editingStepNote?.value || "";
              return (
                <div key={i} style={{ borderBottom: `1px solid ${C.border}`, borderLeft: `3px solid ${borderL}`, background: ss === "skipped" ? (darkMode ? "#0d1118" : "#f8fafc") : "transparent", opacity: ss === "skipped" ? .6 : 1 }}>
                  <div style={{ padding: "12px 16px", display: "flex", alignItems: "flex-start", gap: 9 }}>
                    <div style={{ width: 26, height: 26, borderRadius: 6, background: C.cardAlt, border: `1px solid ${C.border}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                      <span style={{ fontSize: 13, color: ss === "done" ? "#16a34a" : ss === "skipped" ? C.textDim : C.textMuted, fontFamily: "DM Mono", fontWeight: 600 }}>{ss === "done" ? "✓" : ss === "skipped" ? "—" : i + 1}</span>
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 16, fontWeight: ss === "active" || ss === "late" ? 600 : 400, color: ss === "pending" || ss === "skipped" ? C.textMuted : C.text, textDecoration: ss === "skipped" ? "line-through" : "none" }}>{step.name}</span>
                        {ss === "skipped" && <span className="skip-badge">N/A</span>}
                        {ss === "invalid" && <span style={{ fontSize: 11, background: "#fee2e2", color: "#991b1b", border: "1px solid #fecaca", padding: "1px 6px", borderRadius: 3, fontWeight: 700, letterSpacing: ".02em" }}>⚠️ DATA INVÁLIDA</span>}
                        {step.clientDependent && ss !== "skipped" && <span style={{ fontSize: 14, background: darkMode ? "#0d1424" : "#eff6ff", color: "#60a5fa", border: "1px solid #3b82f633", padding: "1px 6px", borderRadius: 3, fontWeight: 600 }}>cliente</span>}
                        {step.custom && <span style={{ fontSize: 11, background: darkMode ? "#1c1409" : "#fef3c7", color: "#d97706", border: "1px solid #d9770633", padding: "1px 6px", borderRadius: 3, fontWeight: 700, letterSpacing: ".02em" }}>🔧 INDIVIDUAL</span>}
                        {chaseThis && <button onClick={(e) => { e.stopPropagation(); openChaseModal(sel.id, i); }} className="chase" style={{ cursor: "pointer", background: C.warnBg, border: `1px solid ${C.warnBorder}` }}>⏰ cobrar cliente{step.chaseLog?.length > 0 ? ` (${step.chaseLog.length}x)` : ""}</button>}
                      </div>
                      {/* Chase follow-up history */}
                      {step.chaseLog && step.chaseLog.length > 0 && (
                        <div style={{ marginTop: 4, marginLeft: 2, borderLeft: `2px solid ${C.warnBorder}`, paddingLeft: 8 }}>
                          {step.chaseLog.map((cl, cli) => (
                            <div key={cli} style={{ fontSize: 12, color: C.warnText, marginBottom: 2, display: "flex", gap: 6, alignItems: "center" }}>
                              <span style={{ fontFamily: "DM Mono", fontSize: 11 }}>#{cl.attempt}</span>
                              <span>{fmtDate(cl.date)}</span>
                              <span style={{ color: C.textMuted }}>{cl.note}</span>
                              {cl.newDeadline && <span style={{ fontWeight: 600 }}>→ novo prazo: {fmtDate(cl.newDeadline)}</span>}
                              <span style={{ fontSize: 11, color: C.textDim }}>por {cl.by}</span>
                            </div>
                          ))}
                        </div>
                      )}
                      {step.activatedAt && editStepDates?.procId === sel.id && editStepDates?.stepIdx === i ? (
                        <div style={{ fontSize: 12, color: C.textMuted, marginTop: 4, display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center", background: darkMode ? "#0d1424" : "#eff6ff", border: `1px solid ${C.accent}`, borderRadius: 6, padding: "6px 8px" }}>
                          <label style={{ display: "flex", alignItems: "center", gap: 3 }}>Ini: <input type="date" value={editStepDates.activatedAt} onChange={e => setEditStepDates(d => ({ ...d, activatedAt: e.target.value }))} style={{ background: C.inputBg, border: `1px solid ${C.border}`, borderRadius: 4, padding: "2px 6px", color: C.text, fontSize: 12 }} /></label>
                          <label style={{ display: "flex", alignItems: "center", gap: 3 }}>Conc: <input type="date" value={editStepDates.completedAt} onChange={e => setEditStepDates(d => ({ ...d, completedAt: e.target.value }))} style={{ background: C.inputBg, border: `1px solid ${C.border}`, borderRadius: 4, padding: "2px 6px", color: C.text, fontSize: 12 }} /></label>
                          <label style={{ display: "flex", alignItems: "center", gap: 3 }}>Por: <select value={editStepDates.completedBy} onChange={e => setEditStepDates(d => ({ ...d, completedBy: e.target.value }))} style={{ background: C.inputBg, border: `1px solid ${C.border}`, borderRadius: 4, padding: "2px 4px", color: C.text, fontSize: 12 }}>{USERS.map(u => <option key={u}>{u}</option>)}</select></label>
                          <button onClick={saveStepDates} style={{ background: "none", border: "1px solid #16a34a", color: "#16a34a", padding: "2px 8px", borderRadius: 4, fontSize: 12, fontWeight: 600 }}>✓ Salvar</button>
                          <button onClick={() => setEditStepDates(null)} style={{ background: "none", border: `1px solid ${C.border}`, color: C.textMuted, padding: "2px 6px", borderRadius: 4, fontSize: 12 }}>×</button>
                        </div>
                      ) : step.activatedAt && (
                        <div style={{ fontSize: 13, color: C.textMuted, marginTop: 3, display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
                          <span>Ini: {fmtDate(step.activatedAt)}</span>
                          {dl && <span style={{ color: ss === "late" ? C.alertText : ss === "done" ? C.textMuted : daysLeft !== null && daysLeft <= 2 ? C.warnText : C.textMuted }}>
                            {ss === "done" ? `Conc: ${fmtDate(step.completedAt)}` : ss === "late" ? `Era ${fmtDate(dl)} (${Math.abs(daysLeft)} DU atraso)` : `Prazo ${fmtDate(dl)} (${daysLeft} DU)`}
                          </span>}
                          {step.completedBy && <span>por {step.completedBy}</span>}
                          <button onClick={() => openDeadlineModal(sel.id, i)} style={{ background: "none", border: "none", color: C.accent, fontSize: 14, padding: 0, textDecoration: "underline dotted", cursor: "pointer", display: "flex", alignItems: "center", gap: 2 }}>
                            {step.deadlineDays}d padrão<Edit2 size={8} />
                          </button>
                          {canEditDyn(activeUser) && <button onClick={() => setEditStepDates({ procId: sel.id, stepIdx: i, activatedAt: step.activatedAt || "", completedAt: step.completedAt || "", completedBy: step.completedBy || activeUser })} style={{ background: "none", border: "none", color: C.accent, fontSize: 12, padding: 0, cursor: "pointer", opacity: .5, display: "flex", alignItems: "center", gap: 2 }}>
                            <Edit2 size={9} />editar datas
                          </button>}
                        </div>
                      )}
                      {noteEdit ? (
                        <div style={{ marginTop: 6 }}>
                          <textarea value={noteVal} onChange={e => setEditingStepNote(n => ({ ...n, value: e.target.value }))} rows={2} style={{ fontSize: 14 }} />
                          <div style={{ display: "flex", gap: 5, marginTop: 3 }}>
                            <button onClick={() => { saveStepNotes(sel.id, i, noteVal); setEditingStepNote(null); }} style={{ background: "none", border: "1px solid #16a34a", color: "#16a34a", padding: "3px 8px", borderRadius: 4, fontSize: 14 }}>Salvar</button>
                            <button onClick={() => setEditingStepNote(null)} style={{ background: "none", border: `1px solid ${C.border}`, color: C.textMuted, padding: "3px 8px", borderRadius: 4, fontSize: 14 }}>×</button>
                          </div>
                        </div>
                      ) : step.notes ? (
                        <div onClick={() => { setEditingStepNote({ stepIdx: i, value: step.notes }); }} style={{ marginTop: 4, padding: "4px 8px", background: darkMode ? "#1c1409" : "#fef3c7", border: `1px solid ${C.warnBorder}`, borderRadius: 4, fontSize: 14, color: C.warnText, cursor: "pointer", display: "flex", alignItems: "center", gap: 3 }}>📝 {step.notes}<Edit2 size={8} style={{ opacity: .5 }} /></div>
                      ) : (
                        <button onClick={() => setEditingStepNote({ stepIdx: i, value: "" })} style={{ marginTop: 3, background: "none", border: "none", color: C.textDim, fontSize: 14, padding: 0, cursor: "pointer" }}>+ nota</button>
                      )}
                    </div>
                    <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                      {canEditDyn(activeUser) && !step.completedAt && !step.skipped && sel.status !== "completed" && (
                        <button onClick={() => { setCompleting(completing === i ? null : i); setComplDate(todayStr()); }} style={{ fontSize: 14, padding: "3px 8px", border: `1px solid ${ss === "late" ? C.alertBorder : C.accent + "66"}`, background: "none", color: ss === "late" ? C.alertText : C.accent, borderRadius: 5, whiteSpace: "nowrap" }}>
                          {completing === i ? "×" : "Concluir"}
                        </button>
                      )}
                      {canEditDyn(activeUser) && !step.completedAt && sel.status !== "completed" && (
                        <button onClick={() => toggleSkip(sel.id, i)} style={{ fontSize: 12, padding: "2px 6px", border: `1px solid ${C.border}`, background: step.skipped ? C.accentMuted : "none", color: step.skipped ? C.accent : C.textDim, borderRadius: 4 }}>
                          {step.skipped ? "↩ Restaurar" : "N/A"}
                        </button>
                      )}
                      {canEditDyn(activeUser) && <button onClick={() => deleteStep(sel.id, i)} style={{ background: "none", border: "none", color: C.textDim, padding: 3, opacity: .3 }}><Trash2 size={11} /></button>}
                    </div>
                  </div>
                  {completing === i && (
                    <div style={{ padding: "0 16px 11px 50px", display: "flex", gap: 7, alignItems: "center" }}>
                      <input type="date" value={complDate} onChange={e => setComplDate(e.target.value)} style={{ background: C.inputBg, border: `1px solid ${C.border}`, borderRadius: 6, padding: "5px 9px", color: C.text }} />
                      <button onClick={() => doComplete(sel.id, i)} style={{ background: "none", border: "1px solid #16a34a", color: "#16a34a", padding: "5px 14px", borderRadius: 6, fontSize: 14, fontWeight: 600 }}>✓</button>
                    </div>
                  )}
                </div>
              );
            })}
            {addingStep === sel.id && (
              <div style={{ padding: "14px 16px", borderTop: `2px solid ${C.accent}`, background: darkMode ? "#0d1424" : "#eff6ff" }}>
                <div style={{ fontSize: 14, color: C.accent, fontWeight: 700, marginBottom: 4 }}>🔧 Adicionar etapa individual (exceção — só neste processo)</div>
                <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 10 }}>Esta etapa terá prazo e botão "Concluir" próprios. O processo ficará aberto até que ela seja concluída. Não afeta o template.</div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
                  <input value={newStepForm.name} onChange={e => setNewStepForm(f => ({ ...f, name: e.target.value }))} onKeyDown={e => { if (e.key === "Enter") addCustomStep(sel.id); }} placeholder="Ex: Acompanhamento pós-registro..." style={{ flex: 3, minWidth: 180, background: C.inputBg, border: `1px solid ${C.accent}`, borderRadius: 7, padding: "9px 12px", color: C.text, fontSize: 14 }} autoFocus />
                  <input value={newStepForm.days} onChange={e => setNewStepForm(f => ({ ...f, days: e.target.value }))} onKeyDown={e => { if (e.key === "Enter") addCustomStep(sel.id); }} type="number" min="1" placeholder="Dias" style={{ width: 75, background: C.inputBg, border: `1px solid ${C.accent}`, borderRadius: 7, padding: "9px 12px", color: C.text, fontSize: 14 }} />
                  {/* Toggle etapa cliente */}
                  <button
                    onClick={() => setNewStepForm(f => ({ ...f, clientDependent: !f.clientDependent }))}
                    style={{
                      display: "flex", alignItems: "center", gap: 6,
                      padding: "9px 14px", borderRadius: 7, fontSize: 13, fontWeight: 600, cursor: "pointer",
                      border: `2px solid ${newStepForm.clientDependent ? "#60a5fa" : C.border}`,
                      background: newStepForm.clientDependent ? (darkMode ? "#0d1424" : "#eff6ff") : "transparent",
                      color: newStepForm.clientDependent ? "#60a5fa" : C.textMuted,
                    }}>
                    <span style={{ fontSize: 15 }}>👤</span>
                    Etapa do cliente
                    <span style={{
                      width: 28, height: 16, borderRadius: 8, position: "relative", flexShrink: 0,
                      background: newStepForm.clientDependent ? "#3b82f6" : C.border, transition: "background .2s",
                      display: "inline-block"
                    }}>
                      <span style={{
                        position: "absolute", top: 2, left: newStepForm.clientDependent ? 14 : 2,
                        width: 12, height: 12, borderRadius: "50%", background: "#fff", transition: "left .2s"
                      }} />
                    </span>
                  </button>
                  <button onClick={() => addCustomStep(sel.id)} disabled={!newStepForm.name.trim()} style={{ background: newStepForm.name.trim() ? "#16a34a" : C.border, border: "none", color: newStepForm.name.trim() ? "#fff" : C.textMuted, padding: "9px 18px", borderRadius: 7, fontWeight: 700, fontSize: 14, cursor: newStepForm.name.trim() ? "pointer" : "default", display: "flex", alignItems: "center", gap: 5 }}><Check size={14} />Salvar etapa</button>
                  <button onClick={() => setAddingStep(null)} style={{ background: "none", border: `1px solid ${C.border}`, color: C.textMuted, padding: "9px 12px", borderRadius: 7, fontSize: 14 }}>Cancelar</button>
                </div>
                {newStepForm.clientDependent && (
                  <div style={{ marginTop: 8, fontSize: 12, color: "#60a5fa", display: "flex", alignItems: "center", gap: 5 }}>
                    <span>⏰</span> Alerta automático de cobrança após {templates[sel.type]?.chaseDays || 2} DU sem resposta do cliente.
                  </div>
                )}
              </div>
            )}
          </div>
          {/* Log */}
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, overflow: "hidden" }}>
            <div style={{ padding: "13px 16px", borderBottom: `1px solid ${C.border}` }}><h2 style={{ fontSize: 16, fontWeight: 700 }}>Histórico</h2></div>
            <div style={{ maxHeight: 460, overflowY: "auto" }}>
              {[...sel.log].reverse().map((l, i) => (
                <div key={i} style={{ padding: "8px 13px", borderBottom: `1px solid ${C.border}`, display: "flex", gap: 7 }}>
                  <div style={{ width: 5, height: 5, borderRadius: "50%", background: C.accent, flexShrink: 0, marginTop: 5 }} />
                  <div><div style={{ fontSize: 14 }}>{l.action}</div><div style={{ fontSize: 14, color: C.textMuted, marginTop: 1, fontFamily: "DM Mono" }}>{fmtTs(l.ts)}</div><div style={{ fontSize: 14, color: C.accent, marginTop: 1 }}>👤 {l.user}</div></div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    );
  };

  /* ════════════ TEMPLATE EDITOR ════════════ */
  /* ═ Sync draft when type/cat changes ═ */
  useEffect(() => {
    setEdDraft(JSON.parse(JSON.stringify(getTemplateSteps(templates[edSelType], edSelCat))));
    setEdEditIdx(null); setEdSaved(false);
  }, [edSelType, edSelCat]);

  /* ═ Persist draft to templates (called on every edit) ═ */
  const persistEditorDraft = (finalDraft) => {
    const curSteps = templates[edSelType]?.steps || {};
    const newSteps = Array.isArray(curSteps) ? generateVariants(curSteps) : { ...curSteps };
    newSteps[edSelCat] = finalDraft;
    const curForms = templates[edSelType]?.formsUrl;
    const newForms = (typeof curForms === "object" && curForms) ? { ...curForms } : generateFormsUrls(curForms || templates[edSelType]?.formsLink || "");
    const nt = { ...templates, [edSelType]: { ...templates[edSelType], steps: newSteps, formsUrl: newForms } };
    saveTemplates(nt);
  };

  /* ═ Sync existing processes with current template ═ */
  const syncEditorProcs = (finalDraft) => {
    let syncCount = 0;
    if (!finalDraft || !finalDraft.length) return 0;
    saveProcs(prev => prev.map(p => {
      if (p.type !== edSelType || p.status !== "active") return p;
      if (migrateCategory(p) !== edSelCat) return p;
      const completedSteps = p.steps.filter(s => s.completedAt);
      const customPending = p.steps.filter(s => s.custom && !s.completedAt);
      const completedCount = completedSteps.length;
      const lastDone = completedSteps.length > 0 ? completedSteps[completedSteps.length - 1].completedAt : p.startDate;
      const newPending = finalDraft.slice(completedCount).map((s, i) => ({
        id: completedCount + i, name: s.name, deadlineDays: s.days, clientDependent: s.clientDependent || false,
        activatedAt: i === 0 ? lastDone : null, completedAt: null, completedBy: null, notes: "",
      }));
      const merged = [...completedSteps, ...newPending, ...customPending].map((s, i) => ({ ...s, id: i }));
      syncCount++;
      return { ...p, steps: merged,
        log: [...p.log, { ts: new Date().toISOString(), user: activeUser, action: "Sincronizado com template (etapas individuais preservadas)" }] };
    }));
    return syncCount;
  };

  const TemplateEditor = () => {
    const selType = edSelType, setSelType = setEdSelType;
    const selCat = edSelCat, setSelCat = setEdSelCat;
    const draft = edDraft, setDraft = setEdDraft;
    const editIdx = edEditIdx, setEditIdx = setEdEditIdx;
    const editDraft = edEditDraft, setEditDraft = setEdEditDraft;
    const saved = edSaved, setSaved = setEdSaved;
    const dragIdx = edDragIdx, setDragIdx = setEdDragIdx;
    const dragOverIdx = edDragOverIdx, setDragOverIdx = setEdDragOverIdx;

    const commitEdit = () => {
      if (editIdx === null) return draft;
      const d = [...draft];
      d[editIdx] = { ...d[editIdx], name: editDraft.name, days: parseInt(editDraft.days) || d[editIdx].days, clientDependent: editDraft.clientDependent };
      return d;
    };

    /* ✓ button = save step + persist template immediately */
    const saveStep = () => {
      const finalDraft = commitEdit();
      setDraft(finalDraft); setEditIdx(null); setSaved(false);
      persistEditorDraft(finalDraft);
      showToast("Etapa salva!");
    };

    const startEd = (i) => { setEditIdx(i); setEditDraft({ name: draft[i].name, days: String(draft[i].days), clientDependent: draft[i].clientDependent || false }); };

    /* Drag & Drop */
    const onDragStart = (e, i) => { setDragIdx(i); e.dataTransfer.effectAllowed = "move"; };
    const onDragOver = (e, i) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; if (i !== dragOverIdx) setDragOverIdx(i); };
    const onDragEnd = () => { setDragIdx(null); setDragOverIdx(null); };
    const onDrop = (e, targetIdx) => {
      e.preventDefault();
      if (dragIdx === null || dragIdx === targetIdx) { setDragIdx(null); setDragOverIdx(null); return; }
      const d = [...draft];
      const [moved] = d.splice(dragIdx, 1);
      d.splice(targetIdx, 0, moved);
      setDraft(d); setDragIdx(null); setDragOverIdx(null); setSaved(false);
    };

    /* Full save = persist + sync processes */
    const doSaveTemplate = () => {
      const finalDraft = commitEdit();
      setDraft(finalDraft); setEditIdx(null);
      persistEditorDraft(finalDraft);
      const count = syncEditorProcs(finalDraft);
      setSaved(true);
      showToast("Template salvo!" + (count > 0 ? " " + count + " processo(s) atualizado(s)" : ""));
    };

    const curFormsUrl = getFormsUrl(templates[selType], selCat);
    const setFormsUrl = (url) => {
      const curForms = templates[selType]?.formsUrl;
      const newForms = (typeof curForms === "object" && curForms) ? { ...curForms } : generateFormsUrls(curForms || "");
      newForms[selCat] = url;
      saveTemplates({ ...templates, [selType]: { ...templates[selType], formsUrl: newForms } });
    };

    /* Add step + persist */
    const addStep = () => {
      const nd = [...draft, { name: "Nova etapa", days: 3, clientDependent: false }];
      setDraft(nd); setSaved(false);
      persistEditorDraft(nd);
    };

    /* Delete step + persist */
    const delStep = (idx) => {
      const nd = draft.filter((_, j) => j !== idx);
      setDraft(nd); setSaved(false);
      persistEditorDraft(nd);
    };

    return (
      <div style={{ paddingBottom: 40 }}>
        <h1 style={{ fontSize: 18, fontWeight: 800, marginBottom: 5 }}>Editor de Etapas — Templates</h1>
        <p style={{ fontSize: 14, color: C.textMuted, marginBottom: 16 }}>Cada tipo tem 3 variantes. Arraste etapas para reordenar. Edições são salvas automaticamente.</p>

        <div style={{ display: "flex", gap: 7, marginBottom: 12, flexWrap: "wrap" }}>
          {Object.entries(templates).map(([k, t]) => <button key={k} onClick={() => setSelType(k)} style={{ padding: "7px 14px", borderRadius: 7, border: `1px solid ${selType === k ? t.color : C.border}`, background: selType === k ? (t.bgLight ? t.bgLight[darkMode ? "dark" : "light"] : C.accentMuted) : "none", color: selType === k ? t.color : C.textMuted, fontWeight: selType === k ? 600 : 400, fontSize: 14 }}>{t.icon} {t.label}</button>)}
        </div>

        <div style={{ display: "flex", gap: 0, marginBottom: 16, borderRadius: 10, overflow: "hidden", border: `1px solid ${C.border}` }}>
          {CATEGORIES.map(c => {
            const ccc = CATEGORY_COLORS[c]; const active = selCat === c;
            const stLen = getTemplateSteps(templates[selType], c).length;
            return <button key={c} onClick={() => setSelCat(c)} style={{ flex: 1, padding: "10px 8px", background: active ? (darkMode ? ccc.bg_d : ccc.bg_l) : "transparent", border: "none", borderBottom: active ? `3px solid ${ccc.fg}` : "3px solid transparent", color: active ? ccc.fg : C.textMuted, fontWeight: active ? 700 : 400, fontSize: 14, cursor: "pointer" }}>
              <div style={{ fontSize: 16 }}>{CATEGORY_ICONS[c]}</div>
              <div>{CATEGORY_LABELS[c]}</div>
              <div style={{ fontSize: 12, opacity: .7 }}>{stLen} etapas</div>
            </button>;
          })}
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
          <span style={{ fontSize: 14, color: C.textMuted, fontWeight: 600, whiteSpace: "nowrap" }}>📋 URL do formulário ({CATEGORY_LABELS[selCat]}):</span>
          <input value={curFormsUrl} onChange={e => setFormsUrl(e.target.value)} placeholder="Cole a URL do formulário..." style={{ flex: 1, minWidth: 200, background: C.inputBg, border: `1px solid ${C.border}`, borderRadius: 6, padding: "6px 10px", color: C.text, fontSize: 14 }} />
        </div>
        {curFormsUrl ? (
          <a href={curFormsUrl} target="_blank" rel="noopener noreferrer"
            style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 20px", marginBottom: 16, background: darkMode ? "#1e3a5f" : "#dbeafe", border: `2px solid ${C.accent}`, borderRadius: 12, textDecoration: "none", cursor: "pointer" }}>
            <span style={{ fontSize: 28 }}>📋</span>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 15, fontWeight: 700, color: C.accent }}>Enviar formulário para o cliente — {templates[selType]?.icon} {templates[selType]?.label} · {CATEGORY_LABELS[selCat]}</div>
              <div style={{ fontSize: 11, color: C.textMuted, marginTop: 3, fontFamily: "DM Mono", wordBreak: "break-all" }}>{curFormsUrl}</div>
            </div>
            <span style={{ fontSize: 22, color: C.accent, fontWeight: 700 }}>↗</span>
          </a>
        ) : (
          <div style={{ padding: "12px 18px", marginBottom: 16, background: C.cardAlt, border: `2px dashed ${C.border}`, borderRadius: 12, fontSize: 13, color: C.textMuted, textAlign: "center" }}>
            Nenhum formulário configurado para esta categoria. Cole a URL acima.
          </div>
        )}

        <button onClick={addStep} style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, width: "100%", background: darkMode ? "#1e3a5f" : "#dbeafe", border: `2px dashed ${C.accent}`, color: C.accent, padding: "12px", borderRadius: 10, fontSize: 15, fontWeight: 700, cursor: "pointer", marginBottom: 12 }}><Plus size={16} />Adicionar nova etapa</button>

        <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, overflow: "hidden" }}>
          <div style={{ padding: "10px 16px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <h2 style={{ fontSize: 15, fontWeight: 700 }}>{CATEGORY_ICONS[selCat]} {templates[selType]?.icon} {templates[selType]?.label} — {draft.length} etapas</h2>
            <span style={{ fontSize: 12, color: C.textMuted }}>↕ Arraste para reordenar</span>
          </div>

          {draft.map((step, i) => (
            <div key={i}
              draggable={editIdx !== i}
              onDragStart={e => onDragStart(e, i)}
              onDragOver={e => onDragOver(e, i)}
              onDrop={e => onDrop(e, i)}
              onDragEnd={onDragEnd}
              className="tsr"
              style={{
                padding: "10px 16px", borderBottom: `1px solid ${C.border}`,
                display: "flex", alignItems: "center", gap: 8,
                cursor: editIdx === i ? "default" : "grab",
                userSelect: "none", WebkitUserSelect: "none",
                background: dragOverIdx === i ? (darkMode ? "#1e3a5f" : "#dbeafe") : dragIdx === i ? (darkMode ? "#1c1409" : "#fef9c3") : "transparent",
                opacity: dragIdx === i ? 0.5 : 1,
                borderTop: dragOverIdx === i ? `2px solid ${C.accent}` : "none",
              }}>
              <span style={{ fontSize: 13, color: C.textMuted, fontFamily: "DM Mono", minWidth: 22, cursor: "grab" }}>☰ {i + 1}</span>
              {editIdx === i ? (
                <div style={{ flex: 1, display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                  <input value={editDraft.name} onChange={e => setEditDraft(d => ({ ...d, name: e.target.value }))} style={{ flex: 1, minWidth: 160, background: C.inputBg, border: `1px solid ${C.accent}`, borderRadius: 6, padding: "5px 9px", color: C.text }} autoFocus />
                  <input value={editDraft.days} onChange={e => setEditDraft(d => ({ ...d, days: e.target.value }))} type="number" min="1" style={{ width: 55, background: C.inputBg, border: `1px solid ${C.accent}`, borderRadius: 6, padding: "5px 9px", color: C.text }} placeholder="dias" />
                  <label style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 13, color: C.textMuted, cursor: "pointer" }}>
                    <input type="checkbox" checked={editDraft.clientDependent} onChange={e => setEditDraft(d => ({ ...d, clientDependent: e.target.checked }))} />cliente
                  </label>
                  <button onClick={saveStep} style={{ background: "#16a34a", border: "none", color: "#fff", padding: "6px 14px", borderRadius: 6, fontSize: 14, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}><Check size={12} />Salvar</button>
                  <button onClick={() => setEditIdx(null)} style={{ background: "none", border: "none", color: C.textMuted, padding: 4 }}><X size={12} /></button>
                </div>
              ) : (
                <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 7 }}>
                  <span style={{ flex: 1, fontSize: 14 }}>{step.name}</span>
                  {step.clientDependent && <span style={{ fontSize: 11, color: "#60a5fa", background: darkMode ? "#0d1424" : "#eff6ff", padding: "1px 6px", borderRadius: 3, fontWeight: 600 }}>cliente</span>}{step.custom && <span style={{ fontSize: 11, color: "#f59e0b", background: darkMode ? "#1c1409" : "#fef3c7", padding: "1px 6px", borderRadius: 3, fontWeight: 600, border: "1px solid #f59e0b33" }}>individual</span>}
                  <span style={{ fontSize: 13, color: C.textMuted, fontFamily: "DM Mono", background: C.cardAlt, padding: "2px 7px", borderRadius: 4 }}>{step.days}d</span>
                </div>
              )}
              <div style={{ display: "flex", gap: 3 }}>
                <button onClick={() => startEd(i)} style={{ background: "none", border: "none", color: C.accent, padding: 2 }}><Edit2 size={11} /></button>
                <button onClick={() => delStep(i)} style={{ background: "none", border: "none", color: C.alertText, padding: 2 }}><Trash2 size={11} /></button>
              </div>
            </div>
          ))}
        </div>

  const UserManagement = () => {
    const activeCount = USERS.filter(u => !blockedUsers.includes(u)).length;
    const blockedCount = blockedUsers.length;

    const doAction = async () => {
      if (!confirmAction) return;
      const { user, action } = confirmAction;
      if (action === "block") {
        const newList = [...blockedUsers.filter(u => u !== user), user];
        await saveBlockedUsers(newList);
        // Log the action
        const entry = { id:`log_${Date.now()}`, user:activeUser, profile:getProfile(activeUser), email:USER_META[activeUser]?.email||"", ts:new Date().toISOString(), action_type:"user_blocked", target_user:user, fora_horario:false, fim_semana:false, feriado:false };
        try { const prev = localStorage.getItem("wc_access_log_v8"); const log = prev?JSON.parse(prev):[]; log.unshift(entry); localStorage.setItem("wc_access_log_v8", JSON.stringify(log.slice(0,500))); } catch {}
        if (USE_SUPABASE) { try { const prev = await DataLayer.get("access_log_v8"); const log = prev||[]; log.unshift(entry); await DataLayer.set("access_log_v8", log.slice(0,500)); } catch {} }
        showToast(`${user} foi INATIVADO. Sessão será encerrada em até 30s.`);
      } else if (action === "unblock") {
        const newList = blockedUsers.filter(u => u !== user);
        await saveBlockedUsers(newList);
        showToast(`${user} foi REATIVADO. Já pode fazer login.`);
      }
      setConfirmAction(null);
