                  {canManage && isBlocked && (
                    <button onClick={() => setConfirmAction({user:u, action:"unblock"})}
                      style={{ fontSize: 13, padding: "5px 12px", borderRadius: 6, border: "1px solid #16a34a", background: darkMode?"#052e16":"#dcfce7", color: "#16a34a", fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}>
                      ✅ Reativar
                    </button>
                  )}
                  {isSelf && <span style={{ fontSize: 12, color: C.textMuted }}>—</span>}
                  {!canManage && !isSelf && <span style={{ fontSize: 12, color: C.textMuted }}>Sem permissão</span>}
                </div>
              </div>
            );
          })}
        </div>

        {/* Confirm modal */}
        {confirmAction && (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.75)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 60, padding: 16 }}>
            <div style={{ background: C.card, border: `1px solid ${confirmAction.action==="block" ? "#dc2626" : "#16a34a"}`, borderRadius: 14, padding: 24, width: "100%", maxWidth: 440 }}>
              <div style={{ textAlign: "center", marginBottom: 16 }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>{confirmAction.action === "block" ? "🚫" : "✅"}</div>
                <h2 style={{ fontSize: 18, fontWeight: 700, color: confirmAction.action==="block" ? "#dc2626" : "#16a34a" }}>
                  {confirmAction.action === "block" ? "Inativar Usuário?" : "Reativar Usuário?"}
                </h2>
              </div>
              <div style={{ background: confirmAction.action==="block" ? (darkMode?"#1f0a0a":"#fee2e2") : (darkMode?"#052e16":"#dcfce7"), border: `1px solid ${confirmAction.action==="block" ? "#dc2626" : "#16a34a"}`, borderRadius: 8, padding: "14px 16px", marginBottom: 16 }}>
                <div style={{ fontSize: 16, fontWeight: 700, color: C.text }}>{confirmAction.user}</div>
                <div style={{ fontSize: 14, color: C.textMuted, marginTop: 4 }}>{USER_META[confirmAction.user]?.role} · {USER_META[confirmAction.user]?.email}</div>
                {confirmAction.action === "block" && (
                  <div style={{ fontSize: 14, color: "#dc2626", marginTop: 8, fontWeight: 600 }}>
                    ⚠️ A sessão ativa será encerrada em até 30 segundos. O usuário verá uma tela de "Acesso Bloqueado" e não poderá mais entrar.
                  </div>
                )}
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => setConfirmAction(null)} style={{ flex: 1, padding: "10px", border: `1px solid ${C.border}`, background: "none", color: C.textMuted, borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: "pointer" }}>Cancelar</button>
                <button onClick={doAction} style={{ flex: 1, padding: "10px", border: "none", borderRadius: 8, fontSize: 14, fontWeight: 700, cursor: "pointer",
                  background: confirmAction.action==="block" ? "#dc2626" : "#16a34a", color: "#fff" }}>
                  {confirmAction.action === "block" ? "🚫 Confirmar Inativação" : "✅ Confirmar Reativação"}
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  };

  if (blocked) return <BlockedScreen userName={sessionStorage.getItem("wc_user_last") || ""} darkMode={darkMode} />;
  if (!session) return <LoginScreen onLogin={handleLogin} darkMode={darkMode} blockedUsers={blockedUsers} />;
  if (!loaded) return <div style={{ background: C.bg, height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: C.textMuted }}>Carregando...</div>;

  return (
    <>
      <style>{css}</style>
      <div style={{ display: "flex", minHeight: "100vh", background: C.bg }}>
        {/* SIDEBAR */}
        <div style={{ width: 224, background: darkMode ? C.card : "#f1f5f9", borderRight: `1px solid ${C.border}`, padding: "16px 0", flexShrink: 0, display: "flex", flexDirection: "column" }}>
          <div style={{ padding: "0 16px 14px", borderBottom: `1px solid ${C.border}`, marginBottom: 5, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 18, fontWeight: 800, color: C.text, letterSpacing: "-.02em" }}>⚖️ Societário</div>
              <div style={{ fontSize: 14, color: C.textMuted, marginTop: 1 }}>WebContador HUB</div>
            </div>
            <button onClick={toggleDark} style={{ background: "none", border: `1px solid ${C.border}`, color: C.textMuted, padding: 5, borderRadius: 7, display: "flex", alignItems: "center" }}>
              {darkMode ? <Sun size={12} /> : <Moon size={12} />}
            </button>
          </div>

          {[
            { id: "dashboard", label: "Dashboard", icon: "📊" },
            { id: "list", label: "Processos", icon: "📁", badge: procs.filter(p => p.status === "active").length },
          ].map(item => (
            <button key={item.id} onClick={() => { setView(item.id); if (item.id !== "detail") setSelId(null); }} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 16px", background: view === item.id ? C.accentMuted : "none", border: "none", color: view === item.id ? C.accent : C.textMuted, fontSize: 16, fontWeight: view === item.id ? 600 : 400, textAlign: "left", borderLeft: view === item.id ? `3px solid ${C.accent}` : "3px solid transparent" }}>
              <span>{item.icon}</span><span style={{ flex: 1 }}>{item.label}</span>
              {item.badge > 0 && <span style={{ background: C.accent, color: "#fff", fontSize: 14, padding: "1px 5px", borderRadius: 9, fontFamily: "DM Mono" }}>{item.badge}</span>}
            </button>
          ))}

          {kpi.archived > 0 && <button onClick={() => setView("archived")} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 16px", background: view === "archived" ? (darkMode ? "#1c1409" : "#fef9c3") : "none", border: "none", color: view === "archived" ? "#92400e" : C.textMuted, fontSize: 16, fontWeight: view === "archived" ? 600 : 400, textAlign: "left", borderLeft: view === "archived" ? "3px solid #92400e" : "3px solid transparent" }}>
            <span>📦</span><span style={{ flex: 1 }}>Arquivados</span><span style={{ fontSize: 14, color: "#92400e", fontFamily: "DM Mono" }}>{kpi.archived}</span>
          </button>}

          <button onClick={() => setView("base")} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 16px", background: view === "base" ? (darkMode ? "#0c2f3d" : "#e0f7fa") : "none", border: "none", color: view === "base" ? "#06b6d4" : C.textMuted, fontSize: 16, fontWeight: view === "base" ? 600 : 400, textAlign: "left", borderLeft: view === "base" ? "3px solid #06b6d4" : "3px solid transparent" }}>
            <Database size={12} /><span style={{ flex: 1 }}>Base de Clientes</span><span style={{ fontSize: 14, color: C.textMuted, fontFamily: "DM Mono" }}>{clientBase.length}</span>
          </button>

          {!isEstagiarioDyn(activeUser) && (
            <button onClick={() => setView("forms")} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 16px", background: view === "forms" ? (darkMode ? "#172554" : "#dbeafe") : "none", border: "none", color: view === "forms" ? "#3b82f6" : C.textMuted, fontSize: 16, fontWeight: view === "forms" ? 600 : 400, textAlign: "left", borderLeft: view === "forms" ? "3px solid #3b82f6" : "3px solid transparent" }}>
              <span style={{ fontSize: 14 }}>📋</span><span style={{ flex: 1 }}>Formulários</span>
              {pendingForms.length > 0 && <span style={{ background: "#3b82f6", color: "#fff", fontSize: 14, padding: "1px 5px", borderRadius: 9, fontFamily: "DM Mono" }}>{pendingForms.length}</span>}
            </button>
          )}

          {canEditTemplatesDyn(activeUser) && <button onClick={() => setView("templates")} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 16px", background: view === "templates" ? (darkMode ? "#1c1409" : "#fef9c3") : "none", border: "none", color: view === "templates" ? "#d97706" : C.textMuted, fontSize: 16, fontWeight: view === "templates" ? 600 : 400, textAlign: "left", borderLeft: view === "templates" ? "3px solid #d97706" : "3px solid transparent" }}>
            <Settings size={12} /><span>Editor de Etapas</span>
          </button>}

          {canViewLogDyn(activeUser) && (
            <button onClick={() => setView("access_log")} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 16px", background: view === "access_log" ? (darkMode ? "#1a0d2e" : "#f3e8ff") : "none", border: "none", color: view === "access_log" ? "#a855f7" : C.textMuted, fontSize: 16, fontWeight: view === "access_log" ? 600 : 400, textAlign: "left", borderLeft: view === "access_log" ? "3px solid #a855f7" : "3px solid transparent" }}>
              <span style={{ fontSize: 14 }}>🔐</span><span>Log de Acesso</span>
            </button>
          )}

          {isAdminDyn(activeUser) && (
            <button onClick={() => setView("team")} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 16px", background: view === "team" ? (darkMode ? "#1e3a5f" : "#dbeafe") : "none", border: "none", color: view === "team" ? "#3b82f6" : C.textMuted, fontSize: 16, fontWeight: view === "team" ? 600 : 400, textAlign: "left", borderLeft: view === "team" ? "3px solid #3b82f6" : "3px solid transparent" }}>
              <span style={{ fontSize: 14 }}>👥</span><span>Gestão de Equipe</span>
              {blockedUsers.length > 0 && <span style={{ background: "#dc2626", color: "#fff", fontSize: 12, padding: "1px 5px", borderRadius: 9, fontFamily: "DM Mono" }}>{blockedUsers.length}</span>}
            </button>
          )}

          {myAlerts.length > 0 && (
            <button onClick={() => setShowAlerts(true)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 16px", background: "none", border: "none", color: C.alertText, fontSize: 16, textAlign: "left", borderLeft: "3px solid transparent" }}>
              <span>🚨</span><span style={{ flex: 1 }}>Alertas</span>
              <span style={{ background: C.alertBg, border: `1px solid ${C.alertBorder}`, color: C.alertText, fontSize: 14, padding: "1px 5px", borderRadius: 9, fontFamily: "DM Mono" }}>{myAlerts.length}</span>
            </button>
          )}

          {(isAdminDyn(activeUser) || isCoordenadorDyn(activeUser)) && (
            <button onClick={downloadBackup} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 16px", background: "none", border: "none", color: C.textMuted, fontSize: 16, textAlign: "left", borderLeft: "3px solid transparent" }}>
              <Download size={12} /><span>Backup (JSON)</span>
            </button>
          )}

          {(isAdminDyn(activeUser) || isCoordenadorDyn(activeUser)) && (
            <button onClick={() => restoreFileRef.current?.click()} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 16px", background: "none", border: "none", color: C.textMuted, fontSize: 16, textAlign: "left", borderLeft: "3px solid transparent" }}>
              <Upload size={12} /><span>Restaurar Backup</span>
            </button>
          )}
          <input ref={restoreFileRef} type="file" accept=".json" onChange={handleRestoreFile} style={{ display: "none" }} />

          <button onClick={() => setShowExport(true)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 16px", background: "none", border: "none", color: C.textMuted, fontSize: 16, textAlign: "left", borderLeft: "3px solid transparent" }}>
            <FileSpreadsheet size={12} /><span>Exportar</span>
          </button>

          <div style={{ padding: "7px 16px 2px", fontSize: 14, color: C.textDim, fontWeight: 700, letterSpacing: ".07em", textTransform: "uppercase", marginTop: 4 }}>Por tipo</div>
          {Object.entries(templates).map(([k, t]) => {
            const cnt = procs.filter(p => p.type === k && p.status === "active").length;
            if (!cnt) return null;
            const lbl = t.label.replace("de Empresa", "").replace("Contratual", "").replace("de Contabilidade", " Contab.").replace("entre Estados", "").replace("de Tipo Jurídico", "").trim();
            return <button key={k} onClick={() => { setFType(k); setView("list"); }} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 16px", background: "none", border: "none", color: C.textMuted, fontSize: 16, textAlign: "left", borderLeft: "3px solid transparent" }}><span>{t.icon}</span><span style={{ flex: 1 }}>{lbl}</span><span style={{ fontSize: 14, color: t.color, fontFamily: "DM Mono", fontWeight: 600 }}>{cnt}</span></button>;
          })}

          {/* HUB preview (future modules) */}
          <div style={{ padding: "7px 16px 2px", fontSize: 14, color: C.textDim, fontWeight: 700, letterSpacing: ".07em", textTransform: "uppercase", marginTop: 8 }}>HUB — Em breve</div>
          {[
            { icon: <Users size={11} />, label: "Clientes" },
            { icon: <BarChart3 size={11} />, label: "Fiscal" },
            { icon: <Briefcase size={11} />, label: "Contábil" },
          ].map((m, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 16px", color: C.textDim, fontSize: 14, opacity: .5 }}>
              {m.icon}<span>{m.label}</span><span style={{ marginLeft: "auto", fontSize: 14, background: C.border, padding: "1px 5px", borderRadius: 3 }}>soon</span>
            </div>
          ))}

          <div style={{ flex: 1 }} />
          <div style={{ padding: "11px 16px", borderTop: `1px solid ${C.border}` }}>
            <div style={{ fontSize: 14, color: C.textMuted, marginBottom: 4, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".05em" }}>👤 {activeUser}</div>
            <div style={{ fontSize: 14, color: C.textMuted, marginBottom: 2 }}>{USER_META[activeUser]?.role}</div>
            <div style={{ fontSize: 14, color: C.textDim || C.textMuted, marginBottom: 6, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", opacity: .6 }}>{USER_META[activeUser]?.email}</div>
            {!isEstagiarioDyn(activeUser) && <button onClick={() => setUserFilterMode(m => !m)} style={{ marginTop: 5, width: "100%", background: userFilterMode ? C.accentMuted : "none", border: `1px solid ${userFilterMode ? C.accent : C.border}`, color: userFilterMode ? C.accent : C.textMuted, padding: "5px", borderRadius: 5, fontSize: 14, fontWeight: 500 }}>
              {userFilterMode ? "✓ Filtrando por mim" : "Ver só os meus"}
            </button>}
            <button onClick={handleLogout} style={{ marginTop: 6, width: "100%", background: "none", border: `1px solid ${C.border}`, color: C.textMuted, padding: "5px", borderRadius: 5, fontSize: 14, fontWeight: 500 }}>
              ⎋ Sair
            </button>
          </div>
        </div>

        {/* MAIN */}
        <div style={{ flex: 1, padding: "24px 28px", overflowY: "auto", minWidth: 0 }}>
          {(() => { try {
            switch(view) {
              case "dashboard": return Dashboard();
              case "list": return ProcList();
              case "detail": return ProcDetail();
              case "base": return BaseView();
              case "forms": return !isEstagiarioDyn(activeUser) ? FormSubmissionsView() : null;
              case "templates": return TemplateEditor();
              case "access_log": return canViewLogDyn(activeUser) ? <AccessLogView darkMode={darkMode} activeUser={activeUser} /> : null;
              case "team": return isAdminDyn(activeUser) ? UserManagement() : null;
              case "archived": return ArchivedView();
              default: return null;
            }
          } catch(e) { return <div style={{padding:40,textAlign:"center"}}><h2 style={{color:"#dc2626"}}>Erro: {String(e.message)}</h2><button onClick={()=>setView("dashboard")} className="bp">Voltar</button></div>; } })()}
        </div>
      </div>

      {modal && NewModal()}
      {showExport && ExportModal()}
      {showReportModal && ReportModal()}
      {emailModal && EmailAlertModal()}
      {showAlerts && AlertsModal()}
      {deleteModal && DeleteProcessModal()}

      {/* ═══ ARCHIVE MODAL ═══ */}
      {archiveModal && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 60, padding: 20 }}>
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 16, padding: 28, width: "100%", maxWidth: 440 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <h2 style={{ fontSize: 16, fontWeight: 700, color: "#92400e" }}>📦 Arquivar Processo</h2>
              <button onClick={() => { setArchiveModal(null); setArchiveReason(""); }} style={{ background: "none", border: "none", color: C.textMuted }}><X size={16} /></button>
            </div>
            <div style={{ background: darkMode ? "#1c1409" : "#fffbeb", border: "1px solid #92400e33", borderRadius: 8, padding: 12, marginBottom: 16, fontSize: 14 }}>
              <strong>{archiveModal.clientName}</strong>
              <div style={{ fontSize: 13, color: C.textMuted, marginTop: 2 }}>{archiveModal.id} · O processo ficará preservado com todo histórico e poderá ser reativado a qualquer momento.</div>
            </div>
            <div style={{ marginBottom: 16 }}>
              <label style={{ fontSize: 13, fontWeight: 600, color: C.textMuted, marginBottom: 4, display: "block" }}>Motivo do arquivamento (opcional)</label>
              <textarea value={archiveReason} onChange={e => setArchiveReason(e.target.value)} placeholder="Ex: Cliente desistiu, aguardando retorno indefinido, mudança de planos..." rows={3} style={{ width: "100%", background: C.inputBg, border: `1px solid ${C.border}`, borderRadius: 8, padding: 10, color: C.text, fontSize: 14, resize: "vertical" }} />
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => { setArchiveModal(null); setArchiveReason(""); }} className="bg" style={{ flex: 1, justifyContent: "center" }}>Cancelar</button>
              <button onClick={confirmArchiveProcess} style={{ flex: 1, padding: "9px", border: "none", borderRadius: 8, background: "#92400e", color: "#fff", fontSize: 14, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>📦 Arquivar</button>
            </div>
          </div>
        </div>
      )}

      {/* ═══ CHASE FOLLOW-UP MODAL ═══ */}
      {chaseModal && (() => {
        const { procId, stepIdx, step, proc } = chaseModal;
        const prevLog = step.chaseLog || [];
        const currentDeadline = getChaseDeadline(step);
        const daysToDeadline = currentDeadline >= todayStr()
          ? businessDaysDiff(todayStr(), currentDeadline)
          : -businessDaysDiff(currentDeadline, todayStr());
        return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 60, padding: 20 }}>
          <div style={{ background: C.card, border: `1px solid ${C.warnBorder}`, borderRadius: 16, padding: 28, width: "100%", maxWidth: 520 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <h2 style={{ fontSize: 16, fontWeight: 700, color: C.warnText }}>⏰ Follow-up — Cobrar Cliente</h2>
              <button onClick={() => setChaseModal(null)} style={{ background: "none", border: "none", color: C.textMuted }}><X size={16} /></button>
            </div>
            
            <div style={{ background: C.warnBg, border: `1px solid ${C.warnBorder}`, borderRadius: 8, padding: 12, marginBottom: 16, fontSize: 14 }}>
              <strong>{proc.clientName}</strong>
              <div style={{ fontSize: 13, color: C.textMuted, marginTop: 2 }}>Etapa {stepIdx + 1}: <strong>{step.name}</strong></div>
              <div style={{ fontSize: 13, color: daysToDeadline <= 0 ? C.alertText : C.warnText, marginTop: 2 }}>
                Prazo: {fmtDate(currentDeadline)} · {daysToDeadline <= 0 ? <strong>{Math.abs(daysToDeadline)}d VENCIDO</strong> : <span>{daysToDeadline}d restantes</span>}
                {prevLog.length > 0 && ` · ${prevLog.length} follow-up(s) anteriores`}
              </div>
            </div>

            {/* Previous follow-ups history */}
            {prevLog.length > 0 && (
              <div style={{ marginBottom: 16, background: C.cardAlt, border: `1px solid ${C.border}`, borderRadius: 8, overflow: "hidden" }}>
                <div style={{ padding: "8px 12px", borderBottom: `1px solid ${C.border}`, fontSize: 13, fontWeight: 700, color: C.textMuted }}>Histórico de follow-ups</div>
                {prevLog.map((cl, cli) => (
                  <div key={cli} style={{ padding: "8px 12px", borderBottom: `1px solid ${C.border}`, fontSize: 13 }}>
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <span style={{ background: C.warnBg, color: C.warnText, padding: "1px 6px", borderRadius: 4, fontWeight: 700, fontSize: 11, fontFamily: "DM Mono" }}>#{cl.attempt}</span>
                      <span style={{ color: C.textMuted }}>{fmtDate(cl.date)}</span>
                      <span style={{ color: C.text }}>{cl.note}</span>
                    </div>
                    {cl.newDeadline && <div style={{ fontSize: 12, color: C.warnText, marginTop: 2, marginLeft: 36 }}>→ Novo prazo: {fmtDate(cl.newDeadline)} · por {cl.by}</div>}
                  </div>
                ))}
              </div>
            )}

            <div style={{ marginBottom: 16 }}>
              <label style={{ fontSize: 13, fontWeight: 600, color: C.textMuted, marginBottom: 4, display: "block" }}>O que foi feito?</label>
              <textarea value={chaseNote} onChange={e => setChaseNote(e.target.value)} placeholder="Ex: Enviado novo WhatsApp cobrando retorno dos documentos..." rows={2} style={{ width: "100%", background: C.inputBg, border: `1px solid ${C.border}`, borderRadius: 8, padding: 10, color: C.text, fontSize: 14, resize: "vertical" }} autoFocus />
            </div>

            <div style={{ marginBottom: 18 }}>
              <label style={{ fontSize: 13, fontWeight: 600, color: C.textMuted, marginBottom: 4, display: "block" }}>Estender prazo em quantos dias úteis?</label>
              <div style={{ display: "flex", gap: 6 }}>
                {[2, 3, 5, 7].map(d => (
                  <button key={d} onClick={() => setChaseExtendDays(String(d))} style={{ padding: "6px 14px", borderRadius: 6, fontSize: 14, fontWeight: chaseExtendDays === String(d) ? 700 : 400, background: chaseExtendDays === String(d) ? C.warnBg : "none", border: `1px solid ${chaseExtendDays === String(d) ? C.warnBorder : C.border}`, color: chaseExtendDays === String(d) ? C.warnText : C.textMuted }}>{d}d</button>
                ))}
                <input value={chaseExtendDays} onChange={e => setChaseExtendDays(e.target.value.replace(/\D/g, ""))} style={{ width: 50, textAlign: "center", background: C.inputBg, border: `1px solid ${C.border}`, borderRadius: 6, padding: "6px", color: C.text, fontSize: 14, fontFamily: "DM Mono" }} />
              </div>
              {chaseExtendDays && !isNaN(parseInt(chaseExtendDays)) && parseInt(chaseExtendDays) > 0 && (
                <div style={{ fontSize: 12, color: C.textMuted, marginTop: 4 }}>Novo prazo será: <strong style={{ color: C.warnText }}>{fmtDate(addBusinessDays(todayStr(), parseInt(chaseExtendDays)))}</strong></div>
              )}
            </div>

            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => setChaseModal(null)} className="bg" style={{ justifyContent: "center" }}>Cancelar</button>
              <button onClick={() => confirmChaseFollowUp("extend")} disabled={!chaseNote.trim()} style={{ flex: 1, padding: "9px", border: "none", borderRadius: 8, background: chaseNote.trim() ? "#d97706" : C.border, color: chaseNote.trim() ? "#fff" : C.textMuted, fontSize: 14, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>⏰ Registrar + Estender</button>
              <button onClick={() => confirmChaseFollowUp("archive")} disabled={!chaseNote.trim()} style={{ padding: "9px 14px", border: `1px solid ${chaseNote.trim() ? "#92400e" : C.border}`, borderRadius: 8, background: "none", color: chaseNote.trim() ? "#92400e" : C.textMuted, fontSize: 14, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", gap: 4 }}>📦 Arquivar</button>
            </div>
          </div>
        </div>
        );
      })()}
      {showImportBase && (() => {
        const IC = darkMode ? { instrBg: "#0d1424", instrBorder: "#1e3a5f", instrText: "#60a5fa" } : { instrBg: "#eff6ff", instrBorder: "#93c5fd", instrText: "#2563eb" };
        return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 60, padding: 20 }}>
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 16, padding: 28, width: "100%", maxWidth: 580 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <h2 style={{ fontSize: 16, fontWeight: 700 }}>📥 Importar Base de Clientes</h2>
              <button onClick={() => { setShowImportBase(false); setImportText(""); }} style={{ background: "none", border: "none", color: C.textMuted, fontSize: 18, cursor: "pointer" }}>×</button>
            </div>
            <div style={{ background: IC.instrBg, border: `1px solid ${IC.instrBorder}`, borderRadius: 10, padding: "14px 16px", marginBottom: 18 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: IC.instrText, marginBottom: 8 }}>📋 Como importar do Excel:</div>
              <ol style={{ fontSize: 13, color: C.textMuted, paddingLeft: 18, lineHeight: 1.8, margin: 0 }}>
                <li>Selecione 4 colunas: <strong style={{ color: C.text }}>Razão Social</strong> + <strong style={{ color: C.text }}>CNPJ</strong> + <strong style={{ color: C.text }}>Telefone</strong> + <strong style={{ color: C.text }}>E-mail</strong></li>
                <li>Copie (Ctrl+C) e cole abaixo (Ctrl+V)</li>
              </ol>
              <div style={{ fontSize: 12, color: "#f59e0b", marginTop: 10 }}>⚠ Se tiver cabeçalho, remova antes de colar.</div>
            </div>
            <textarea
              value={importText}
              onChange={e => setImportText(e.target.value)}
              placeholder={"Cole aqui os dados do Excel:\nEmpresa ABC Ltda\t12.345.678/0001-90\t11 99999-9999\temail@empresa.com\nOutra Empresa\t98.765.432/0001-10\t21 88888-7777\toutro@email.com"}
              style={{ width: "100%", height: 140, background: C.inputBg, border: `1px solid ${C.border}`, borderRadius: 8, padding: 12, color: C.text, resize: "vertical", fontFamily: "DM Mono", fontSize: 12, boxSizing: "border-box", outline: "none" }}
            />
            {importPreview.length > 0 && (
              <div style={{ marginTop: 14 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#4ade80", marginBottom: 8 }}>✅ {importPreview.length} cliente(s) detectados:</div>
                <div style={{ background: C.cardAlt, border: `1px solid ${C.border}`, borderRadius: 8, maxHeight: 160, overflowY: "auto" }}>
                  {importPreview.slice(0, 10).map((r, i) => (
                    <div key={i} style={{ padding: "8px 12px", borderBottom: `1px solid ${C.border}`, display: "flex", gap: 10, alignItems: "center" }}>
                      <span style={{ fontSize: 13, fontWeight: 500, flex: 1 }}>{r.name}</span>
                      <span style={{ fontSize: 12, color: C.textMuted, fontFamily: "DM Mono" }}>{r.cnpj || "—"}</span>
                      {r.tel && <span style={{ fontSize: 12, color: C.textMuted }}>📞{r.tel}</span>}
                      {r.email && <span style={{ fontSize: 12, color: C.textMuted }}>✉{r.email}</span>}
                    </div>
                  ))}
                  {importPreview.length > 10 && <div style={{ padding: "8px 12px", fontSize: 12, color: C.textMuted }}>...e mais {importPreview.length - 10} clientes</div>}
                </div>
              </div>
            )}
            <div style={{ display: "flex", gap: 10, marginTop: 18 }}>
              <button onClick={() => { setShowImportBase(false); setImportText(""); }} style={{ flex: 1, padding: "10px", border: `1px solid ${C.border}`, background: "none", color: C.textMuted, borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>Cancelar</button>
              <button onClick={() => confirmImport("add")} disabled={!importPreview.length} style={{ flex: 1, background: importPreview.length ? C.accentMuted : C.border, border: importPreview.length ? `1px solid ${C.accent}` : "none", color: importPreview.length ? C.accent : C.textMuted, padding: "10px", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: importPreview.length ? "pointer" : "default" }}>+ Mesclar</button>
              <button onClick={() => confirmImport("replace")} disabled={!importPreview.length} style={{ flex: 1, background: importPreview.length ? (darkMode ? "#052e16" : "#dcfce7") : C.border, border: importPreview.length ? "1px solid #16a34a" : "none", color: importPreview.length ? "#16a34a" : C.textMuted, padding: "10px", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: importPreview.length ? "pointer" : "default" }}>↺ Substituir</button>
            </div>
          </div>
        </div>
        );
      })()}
      {showRestoreModal && restorePreview && (() => {
        const RC = darkMode ? { bg: "#0d1424", border: "#1e3a5f", accent: "#f59e0b" } : { bg: "#fffbeb", border: "#fde68a", accent: "#92400e" };
        return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 60, padding: 20 }}>
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 16, padding: 28, width: "100%", maxWidth: 480 }}>
            <h2 style={{ fontSize: 16, fontWeight: 700, marginBottom: 16 }}>🔄 Restaurar Backup</h2>
            <div style={{ background: RC.bg, border: `1px solid ${RC.border}`, borderRadius: 10, padding: "14px 16px", marginBottom: 18 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: RC.accent, marginBottom: 10 }}>⚠ Atenção: esta ação substitui TODOS os dados atuais!</div>
              <div style={{ fontSize: 13, color: C.textMuted, lineHeight: 1.8 }}>
                <div>📅 Backup de: <strong style={{ color: C.text }}>{new Date(restorePreview.exportedAt).toLocaleString("pt-BR")}</strong></div>
                <div>👤 Exportado por: <strong style={{ color: C.text }}>{restorePreview.exportedBy}</strong></div>
                <div>📁 Processos: <strong style={{ color: C.text }}>{restorePreview.processos}</strong></div>
                <div>👥 Clientes: <strong style={{ color: C.text }}>{restorePreview.clientes}</strong></div>
                <div>📋 Templates: <strong style={{ color: C.text }}>{restorePreview.templates} tipos</strong></div>
                <div>🔐 Log de acesso: <strong style={{ color: C.text }}>{restorePreview.hasLog ? "Incluído" : "Não incluído"}</strong></div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => { setShowRestoreModal(false); setRestorePreview(null); }} style={{ flex: 1, padding: "10px", border: `1px solid ${C.border}`, background: "none", color: C.textMuted, borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Cancelar</button>
              <button onClick={confirmRestore} style={{ flex: 1, background: darkMode ? "#422006" : "#fef3c7", border: "1px solid #f59e0b", color: "#d97706", padding: "10px", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Confirmar Restauração</button>
            </div>
          </div>
        </div>
        );
      })()}
      {deadlineModal && DeadlineModal()}

      {toast && (
        <div className="toast" style={{ position: "fixed", bottom: 20, right: 20, background: toast.type === "success" ? (darkMode ? "#052e16" : "#dcfce7") : (darkMode ? "#1f0a0a" : "#fff1f2"), border: `1px solid ${toast.type === "success" ? "#16a34a" : C.alertBorder}`, color: toast.type === "success" ? "#16a34a" : C.alertText, padding: "10px 16px", borderRadius: 9, fontSize: 14, fontWeight: 500, maxWidth: 380, zIndex: 100, boxShadow: "0 4px 20px rgba(0,0,0,.25)", display: "flex", alignItems: "center", gap: 9 }}>
          <span>{toast.type === "success" ? "✓ " : "⚠ "}{toast.msg}</span>
          {toast.action && (
            <button onClick={() => { const item = undoQueue.find(u => u.procId === toast.action.procId && u.stepIdx === toast.action.stepIdx); if (item) undoDelete(item); setToast(null); }} style={{ background: "none", border: "1px solid currentColor", padding: "2px 9px", borderRadius: 4, fontSize: 14, fontWeight: 600, cursor: "pointer", color: "inherit", flexShrink: 0 }}>
              <RotateCcw size={10} /> Desfazer
            </button>
          )}
        </div>
      )}
    </>
  );
}

/* ══ ERROR BOUNDARY ═══════════════════════════════════════════════
   Captura qualquer erro de renderização e mostra uma tela amigável
   em vez de deixar o painel em branco. Assim, se algum dado 
   quebrado escapar das validações, o usuário consegue identificar
   e pedir suporte em vez de ficar olhando tela branca. */
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null, errorInfo: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, errorInfo) {
    console.error("[ErrorBoundary] Erro capturado:", error, errorInfo);
    this.setState({ errorInfo });
  }
  handleReset = () => {
    this.setState({ hasError: false, error: null, errorInfo: null });
    window.location.reload();
  };
  render() {
    if (this.state.hasError) {
      const errMsg = this.state.error ? String(this.state.error.message || this.state.error) : "Erro desconhecido";
      return React.createElement("div", {
        style: {
          minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
          padding: 24, background: "#f8fafc", fontFamily: "'DM Sans', sans-serif"
        }
      }, React.createElement("div", {
        style: {
          maxWidth: 560, background: "#fff", border: "1px solid #e2e8f0", borderRadius: 16,
          padding: 32, boxShadow: "0 10px 25px rgba(0,0,0,.08)"
        }
      },
        React.createElement("div", { style: { fontSize: 48, marginBottom: 16 } }, "⚠️"),
        React.createElement("h1", { style: { fontSize: 22, fontWeight: 800, color: "#0f172a", margin: "0 0 8px", letterSpacing: "-.02em" } }, "Ops, encontramos um erro"),
        React.createElement("p", { style: { fontSize: 15, color: "#475569", margin: "0 0 20px", lineHeight: 1.6 } },
          "O painel encontrou um problema ao carregar. Seus dados estão seguros no banco — apenas a tela não conseguiu renderizar corretamente."
        ),
        React.createElement("div", {
          style: {
            background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8,
            padding: "12px 14px", fontSize: 13, color: "#991b1b", marginBottom: 20,
            fontFamily: "'DM Mono', monospace", wordBreak: "break-word"
          }
        }, errMsg),
        React.createElement("div", { style: { fontSize: 13, color: "#64748b", marginBottom: 20, lineHeight: 1.6 } },
          React.createElement("strong", null, "O que fazer:"),
          React.createElement("br", null),
          "1. Tire um print desta tela e envie para o suporte",
          React.createElement("br", null),
          "2. Clique em \"Tentar novamente\" abaixo",
          React.createElement("br", null),
          "3. Se persistir, acesse o Supabase e verifique se há dados com formato inválido"
        ),
        React.createElement("button", {
          onClick: this.handleReset,
          style: {
            background: "#3b82f6", color: "#fff", border: "none", borderRadius: 8,
            padding: "10px 20px", fontSize: 15, fontWeight: 600, cursor: "pointer",
            fontFamily: "'DM Sans', sans-serif"
          }
        }, "🔄 Tentar novamente")
      ));
    }
    return this.props.children;
  }
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(ErrorBoundary, null, React.createElement(App)));
</script>
</body>
