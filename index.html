const DataLayer = {
  // Todas as chamadas passam pelo proxy seguro — a chave do Supabase fica no servidor
  async get(key) {
    try {
      const r = await fetch("/.netlify/functions/data-proxy", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ action: "get", key }),
      });
      if (r.ok) return await r.json();
    } catch {}
    // Fallback: localStorage caso o proxy falhe
    try { const v = localStorage.getItem("wc_" + key); return v ? JSON.parse(v) : null; } catch { return null; }
  },
  async set(key, value) {
    // Salva localmente para resposta imediata na UI
    try { localStorage.setItem("wc_" + key, JSON.stringify(value)); } catch {}
    // Persiste no Supabase via proxy seguro
    try {
      await fetch("/.netlify/functions/data-proxy", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ action: "set", key, value }),
      });
    } catch {}
  }
};

    feriado: isFeriado(now),
  };

    const log = prev ? JSON.parse(prev) : [];
    log.unshift(entry);
    localStorage.setItem("wc_access_log_v8", JSON.stringify(log.slice(0, 500)));

/* ══ TELA DE LOGIN ════════════════════════════════════════════ */
function LoginScreen({ onLogin, darkMode, blockedUsers }) {
  const [step, setStep] = useState("user"); // "user" | "pin"
  const [selUser, setSelUser] = useState(null);
  const [pin, setPin] = useState("");
  const [erro, setErro] = useState("");
  const [shake, setShake] = useState(false);
  const pinRef = useRef(null);

  const C = darkMode ? {
    bg: "#0f172a", card: "#1e293b", border: "#334155",
    text: "#f1f5f9", muted: "#94a3b8", accent: "#3b82f6",
    accentMuted: "#1e3a5f", inputBg: "#0f172a",
    error: "#ef4444", errorMuted: "#2d0a0a",
  } : {
    bg: "#f8fafc", card: "#ffffff", border: "#e2e8f0",
    text: "#0f172a", muted: "#64748b", accent: "#3b82f6",
    accentMuted: "#dbeafe", inputBg: "#f8fafc",
    error: "#ef4444", errorMuted: "#fef2f2",
  };

  const avatarColor = (u) => ({ Sabrina: "#8b5cf6", Fernanda: "#06b6d4", Gabriela: "#10b981" }[u] || "#3b82f6");

  useEffect(() => { if (step === "pin" && pinRef.current) pinRef.current.focus(); }, [step]);

  const handleKeyboard = (e) => {
    if (e.key === "Backspace") { setPin(p => p.slice(0,-1)); setErro(""); return; }
    if (e.key === "Escape") { setStep("user"); setPin(""); setErro(""); return; }
    if (/^[0-9]$/.test(e.key) && pin.length < 4) {
      const novo = pin + e.key; setPin(novo);
      if (novo.length === 4) { setTimeout(() => { if (novo === CREDENTIALS[selUser]) { onLogin(selUser); } else { setShake(true); setErro("PIN incorreto."); setPin(""); setTimeout(() => setShake(false), 500); } }, 120); }
    }
  };

  const handlePinKey = (k) => {
    if (k === "DEL") { setPin(p => p.slice(0,-1)); setErro(""); return; }
    if (pin.length >= 4) return;
    const novo = pin + k;
    setPin(novo);
    if (novo.length === 4) {
      setTimeout(() => {
        if (novo === CREDENTIALS[selUser]) {
          onLogin(selUser);
        } else {
          setShake(true);
          setErro("PIN incorreto. Tente novamente.");
          setPin("");
          setTimeout(() => setShake(false), 500);
        }
      }, 120);
    }
  };

  return (
    <div style={{ minHeight: "100vh", background: C.bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap');
        .login-wrap * { font-family: 'DM Sans', sans-serif; box-sizing: border-box; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
        @keyframes shakeAnim { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
        .fade-up { animation: fadeUp .28s ease; }
        .pin-shake { animation: shakeAnim .4s ease; }
        .user-card { transition: all .15s ease; cursor: pointer; }
        .user-card:hover { transform: translateY(-2px); }
        .pin-key { transition: all .12s ease; cursor: pointer; user-select: none; }
        .pin-key:active { transform: scale(.92); }
      `}</style>

      <div className="login-wrap" style={{ width: "100%", maxWidth: 360 }}>
        {/* Logo */}
        <div style={{ textAlign: "center", marginBottom: 32 }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>⚖️</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: C.text, letterSpacing: "-.03em" }}>WebContador</div>
          <div style={{ fontSize: 14, color: C.muted, marginTop: 3 }}>Painel Societário</div>
        </div>

        <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 16, padding: 28, boxShadow: darkMode ? "0 8px 32px rgba(0,0,0,.4)" : "0 4px 24px rgba(0,0,0,.08)" }}>
          {step === "user" && (
            <div className="fade-up">
              <div style={{ fontSize: 14, fontWeight: 600, color: C.text, marginBottom: 4 }}>Quem está acessando?</div>
              <div style={{ fontSize: 14, color: C.muted, marginBottom: 20 }}>Selecione seu nome para continuar</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {USERS.filter(u => !(blockedUsers||[]).includes(u)).map(u => (
                  <div key={u} className="user-card" onClick={() => { setSelUser(u); setStep("pin"); setPin(""); setErro(""); }}
                    style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 16px", border: `1.5px solid ${C.border}`, borderRadius: 12, background: C.inputBg }}>
                    <div style={{ width: 40, height: 40, borderRadius: "50%", background: avatarColor(u), display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, fontWeight: 700, color: "#fff" }}>
                      {u[0]}
                    </div>
                    <div>
                      <div style={{ fontSize: 14, fontWeight: 600, color: C.text }}>{u}</div>
                      <div style={{ fontSize: 14, color: C.muted }}>Departamento Societário</div>
                    </div>
                    <div style={{ marginLeft: "auto", color: C.muted, fontSize: 18 }}>›</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {step === "pin" && (
            <div className="fade-up" ref={pinRef} tabIndex={0} onKeyDown={handleKeyboard} style={{outline:"none"}}>
              <button onClick={() => { setStep("user"); setPin(""); setErro(""); }}
                style={{ background: "none", border: "none", color: C.muted, fontSize: 14, padding: "0 0 16px 0", cursor: "pointer", display: "flex", alignItems: "center", gap: 5 }}>
                ← Voltar
              </button>
              <div style={{ textAlign: "center", marginBottom: 20 }}>
                <div style={{ width: 52, height: 52, borderRadius: "50%", background: avatarColor(selUser), display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, fontWeight: 700, color: "#fff", margin: "0 auto 10px" }}>
                  {selUser?.[0]}
                </div>
                <div style={{ fontSize: 15, fontWeight: 700, color: C.text }}>{selUser}</div>
                <div style={{ fontSize: 14, color: C.muted, marginTop: 3 }}>Digite seu PIN de 4 dígitos</div>
                <div style={{ fontSize: 14, color: C.accent, marginTop: 4, opacity: .6 }}>Use o teclado físico ou o virtual abaixo</div>
              </div>

              {/* Pontos do PIN */}
              <div className={shake ? "pin-shake" : ""} style={{ display: "flex", justifyContent: "center", gap: 14, marginBottom: 20 }}>
                {[0,1,2,3].map(i => (
                  <div key={i} style={{ width: 14, height: 14, borderRadius: "50%", background: i < pin.length ? C.accent : "none", border: `2px solid ${i < pin.length ? C.accent : C.border}`, transition: "all .15s" }} />
                ))}
              </div>

              {erro && (
                <div style={{ background: C.errorMuted, border: `1px solid ${C.error}`, borderRadius: 8, padding: "8px 12px", fontSize: 14, color: C.error, textAlign: "center", marginBottom: 16 }}>
                  {erro}
                </div>
              )}

              {/* Teclado numérico */}
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 }}>
                {["1","2","3","4","5","6","7","8","9","","0","DEL"].map((k, i) => (
                  k === "" ? <div key={i} /> :
                  <div key={i} className="pin-key" onClick={() => handlePinKey(k)}
                    style={{ padding: "14px 0", textAlign: "center", borderRadius: 10, background: k === "DEL" ? "none" : C.accentMuted, border: `1px solid ${k === "DEL" ? C.border : C.accent}`, color: k === "DEL" ? C.muted : C.accent, fontSize: k === "DEL" ? 11 : 18, fontWeight: 700 }}>
                    {k === "DEL" ? "⌫" : k}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        <div style={{ textAlign: "center", marginTop: 18, fontSize: 14, color: C.muted }}>
          WebContador © 2026 — Acesso restrito
        </div>
      </div>
    </div>
  );
}

              \u2022 <strong>{e.user}</strong> ({e.profile || "?"}) \u2014 {fmt(e.ts)} ({diaSem(e.ts)})
              {e.fim_semana && " \u00b7 Fim de semana"}
              {e.feriado && " \u00b7 Feriado"}
              {e.fora_horario && " \u00b7 Fora do hor\u00e1rio"}

                <th key={h} style={{ padding: "10px 14px", textAlign: "left", fontSize: 14, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: ".05em", borderBottom: `1px solid ${C.border}` }}>{h}</th>
              ))}

              <tr><td colSpan={5} style={{ padding: "24px", textAlign: "center", color: C.muted, fontSize: 14 }}>Nenhum acesso registrado ainda.</td></tr>

              const alert = isAlert(e);
              return (

                  <tr onClick={() => setExpanded(expanded === e.id ? null : e.id)} style={{ borderBottom: `1px solid ${C.border}`, background: alert ? C.warnMuted : "transparent", cursor: "pointer" }}>
                    <td style={{ padding: "10px 14px", fontWeight: 600, color: C.text }}>

                      <td colSpan={5} style={{ padding: "10px 14px 10px 56px", fontSize: 14, color: C.muted }}>
                        <strong>IP:</strong> {e.ip || "n/a"} &nbsp;\u00b7&nbsp;
                        <strong>Navegador:</strong> {(e.userAgent || "n/a").substring(0, 80)}{(e.userAgent||"").length > 80 ? "..." : ""} &nbsp;\u00b7&nbsp;

                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

const SUSEP_KEYWORDS = ["SUSEP"];
const PRUDENTIAL_KEYWORDS = ["PRUDENTIAL"];
const isSusepStep = (name) => SUSEP_KEYWORDS.some(k => name.toUpperCase().includes(k));
const isPrudentialStep = (name) => PRUDENTIAL_KEYWORDS.some(k => name.toUpperCase().includes(k));

/* ═ VARIANTES: cada tipo tem 3 listas de etapas independentes ═ */
const CATEGORIES = ["prudential", "corretora", "outros"];
const CATEGORY_LABELS = { prudential: "Prudential", corretora: "Corretora (outros)", outros: "Outros (não corretora)" };
const CATEGORY_ICONS = { prudential: "🏛️", corretora: "🛡️", outros: "🏢" };
const CATEGORY_COLORS = { prudential: { bg_d: "#1e3a5f", bg_l: "#dbeafe", fg: "#3b82f6" }, corretora: { bg_d: "#052e16", bg_l: "#dcfce7", fg: "#16a34a" }, outros: { bg_d: "#1c1409", bg_l: "#fef3c7", fg: "#d97706" } };

/* Helper: get steps for a category — handles both old (array) and new (object) format */
const getTemplateSteps = (tpl, category) => {
  if (!tpl) return [];
  if (Array.isArray(tpl.steps)) return tpl.steps;
  return (tpl.steps && tpl.steps[category || "corretora"]) || [];
};

/* Helper: get forms URL for a category */
const getFormsUrl = (tpl, category) => {
  if (!tpl) return "";
  if (typeof tpl.formsUrl === "string") return tpl.formsUrl || tpl.formsLink || "";
  if (typeof tpl.formsLink === "string") return tpl.formsLink || "";
  return (tpl.formsUrl && tpl.formsUrl[category || "corretora"]) || "";
};

/* Generate 3 variant step lists from a master list */
const generateVariants = (masterSteps) => ({
  prudential: masterSteps.map(s => ({...s})),
  corretora: masterSteps.filter(s => !isPrudentialStep(s.name)).map(s => ({...s})),
  outros: masterSteps.filter(s => !isSusepStep(s.name) && !isPrudentialStep(s.name)).map(s => ({...s}))
});

/* Generate 3 form URL slots */
const generateFormsUrls = (url) => ({ prudential: url || "", corretora: url || "", outros: url || "" });

/* URL único de formulário usado pela WebContador. Migra qualquer URL antigo (forms.office.com)
   ou vazio para este URL automaticamente no próximo load. */
const FORM_URL_CANONICAL = "https://hub-webcontador.netlify.app/formulario-abertura.html";
const FORM_URL_LEGACY = "https://forms.office.com/r/0MjY4BcrtC";
const migrateFormsUrl = (urls) => {
  const out = { prudential: "", corretora: "", outros: "" };
  for (const k of ["prudential", "corretora", "outros"]) {
    const v = (urls && urls[k]) || "";
    out[k] = (!v || v === FORM_URL_LEGACY) ? FORM_URL_CANONICAL : v;
  }
  return out;
};

const migrateCategory = (proc) => {
  if (proc.clientCategory) return proc.clientCategory;
  return proc.isCorretora !== false ? "corretora" : "outros";
};

/* Migrate old template format (flat steps array) to new (variant object) */
const migrateTemplate = (tpl) => {
  if (!tpl) return tpl;
  if (Array.isArray(tpl.steps)) {
    return { ...tpl, steps: generateVariants(tpl.steps), formsUrl: migrateFormsUrl(generateFormsUrls(tpl.formsUrl || tpl.formsLink || "")) };
  }
  return { ...tpl, formsUrl: migrateFormsUrl(tpl.formsUrl) };
};
const migrateAllTemplates = (tmpls) => {
  const out = {};
  for (const k in tmpls) out[k] = migrateTemplate(tmpls[k]);
  return out;
};

/* ══ HELPERS ══════════════════════════════════════════════════ */
const todayStr = () => new Date().toISOString().split("T")[0];
const addDays = (d, n) => {
  if (!d || typeof d !== "string" || !/^\d{4}-\d{2}-\d{2}$/.test(d)) return null;
  const dt = new Date(d + "T12:00:00");
  if (isNaN(dt.getTime())) return null;
  dt.setDate(dt.getDate() + n);
  return dt.toISOString().split("T")[0];
};
/* ── VALIDAÇÃO DE DATA: garante formato AAAA-MM-DD com ano 2020-2040 ─ */
const isValidDateStr = (d) => {
  if (!d || typeof d !== "string") return false;
  if (!/^\d{4}-\d{2}-\d{2}$/.test(d)) return false;
  const [y, m, day] = d.split("-").map(Number);
  if (y < 2020 || y > 2040) return false;
  if (m < 1 || m > 12) return false;
  if (day < 1 || day > 31) return false;
  const dt = new Date(d + "T12:00:00");
  return !isNaN(dt.getTime());
};
/* ── DIAS ÚTEIS: pula sáb/dom/feriados ──────────────── */
const addBusinessDays = (d, n) => {
  /* PROTEÇÃO: se a data for inválida, retorna null em vez de explodir */
  if (!isValidDateStr(d)) {
    console.warn("[addBusinessDays] Data inválida ignorada:", d);
    return null;
  }
  const dt = new Date(d + "T12:00:00");
  let remaining = Number(n) || 0;
  while (remaining > 0) {
    dt.setDate(dt.getDate() + 1);
    const day = dt.getDay();
    const ds = `${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;
    if (day !== 0 && day !== 6 && !FERIADOS_BR.includes(ds)) remaining--;
  }
  return dt.toISOString().split("T")[0];
};
const daysDiff = (a, b) => Math.round((new Date(b) - new Date(a)) / 86400000);
/* Conta dias úteis entre duas datas (positivo quando b > a) */
const businessDaysDiff = (a, b) => {
  if (!a || !b || a >= b) return 0;
  let d = new Date(a + "T12:00:00");
  const t = new Date(b + "T12:00:00");
  let count = 0;
  while (d < t) {
    d.setDate(d.getDate() + 1);
    const day = d.getDay();
    const ds = `${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    if (day !== 0 && day !== 6 && !FERIADOS_BR.includes(ds)) count++;
  }
  return count;
};
/* Retorna o prazo efetivo de uma etapa respeitando extensões do chaseLog */
const effectiveDeadline = (step) => {
  const base = addBusinessDays(step.activatedAt, step.deadlineDays);
  if (!base) return null; /* PROTEÇÃO: data inválida propaga null */
  if (step.chaseLog && step.chaseLog.length > 0) {
    const last = step.chaseLog[step.chaseLog.length - 1];
    if (last.newDeadline && last.newDeadline > base) return last.newDeadline;
  }
  return base;
};
const fmtDate = d => d ? new Date(d + "T12:00:00").toLocaleDateString("pt-BR") : "—";
const fmtTs = ts => { const d = new Date(ts); return d.toLocaleDateString("pt-BR") + " " + d.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" }); };
const normalizeStr = s => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();

const stepStatus = (step) => {
  if (step.skipped) return "skipped";
  if (step.completedAt) return "done";
  if (!step.activatedAt) return "pending";
  const dl = effectiveDeadline(step);
  if (!dl) return "invalid"; /* PROTEÇÃO: data quebrada não derruba o painel */
  return todayStr() > dl ? "late" : "active";
};

/* ══ STALE STEP DETECTION ══════════════════════════════════════════
   Uma etapa é "stale" (obsoleta) quando o time já avançou para etapas
   posteriores sem formalmente marcar esta como concluída ou N/A.
   Critério: alguma etapa de índice maior foi ativada ou concluída
   DEPOIS desta. Etapas stale NÃO contam como atrasadas.           */
const isStaleStep = (step, stepIdx, allSteps) => {
  if (!step.activatedAt || step.completedAt || step.skipped) return false;
  for (let j = stepIdx + 1; j < allSteps.length; j++) {
    const s = allSteps[j];
    if ((s.activatedAt && s.activatedAt > step.activatedAt) ||
        (s.completedAt && s.completedAt >= step.activatedAt)) return true;
  }
  return false;
};

/* Retorna apenas as etapas genuinamente atrasadas (não-stale) de um processo */
const getLateSteps = (proc) =>
  proc.steps.filter((s, i) => stepStatus(s) === "late" && !isStaleStep(s, i, proc.steps));

const isClientChaseNeeded = (step, chaseDays) => {
  const cd = typeof chaseDays === "number" ? chaseDays : 2;
  if (!step.clientDependent || step.completedAt || step.skipped || !step.activatedAt) return false;
  if (step.chaseLog && step.chaseLog.length > 0) {
    const lastChase = step.chaseLog[step.chaseLog.length - 1];
    if (lastChase.newDeadline) {
      /* DU restantes até prazo estendido (0 ou neg = vencido = também precisa cobrar) */
      const duToExtended = lastChase.newDeadline >= todayStr()
        ? businessDaysDiff(todayStr(), lastChase.newDeadline) : -1;
      return duToExtended <= cd;
    }
  }
  const deadline = addBusinessDays(step.activatedAt, step.deadlineDays);
  const duToDeadline = deadline >= todayStr()
    ? businessDaysDiff(todayStr(), deadline) : -1;
  return duToDeadline <= cd;
};

/* Helper: get effective chase deadline for a step */
const getChaseDeadline = (step) => {
  if (step.chaseLog && step.chaseLog.length > 0) {
    const lastChase = step.chaseLog[step.chaseLog.length - 1];
    if (lastChase.newDeadline) return lastChase.newDeadline;
  }
  return addBusinessDays(step.activatedAt, step.deadlineDays);
};

/* ══ BUILD STEPS (por categoria — 3 variantes independentes) ═ */
const buildSteps = (type, completedCount, startDate, TMPLS, isCorretora = true, clientCategory = null) => {
  const cat = clientCategory || (isCorretora ? "corretora" : "outros");
  const tmplObj = (TMPLS || DEFAULT_TEMPLATES)[type];
  const filtered = getTemplateSteps(tmplObj, cat);
  if (!filtered.length) { const fb = getTemplateSteps((TMPLS || DEFAULT_TEMPLATES).alteracao, cat); if (fb.length) return buildSteps("alteracao", completedCount, startDate, TMPLS, isCorretora, clientCategory); }
  const steps = filtered.map((s, i) => ({
    id: i, name: s.name, deadlineDays: s.days,
    clientDependent: s.clientDependent || false,
    activatedAt: null, completedAt: null, completedBy: null, notes: ""
  }));
  let prev = startDate;
  for (let i = 0; i < completedCount && i < steps.length; i++) {
    steps[i].activatedAt = prev;
    const doneAt = addDays(prev, Math.max(1, Math.ceil(steps[i].deadlineDays * 0.8)));
    steps[i].completedAt = doneAt;
    steps[i].completedBy = "Sabrina";
    steps[i].imported = true; // data estimada — NÃO exibir na linha do tempo
    prev = doneAt;
  }
  if (completedCount < steps.length) steps[completedCount].activatedAt = prev;
  return steps;
};

/* ══ IMPORT BASE MODAL (standalone component) ════════════════ */
function App() {
  /* ── SESSÃO / LOGIN ─────────────────────────────────────── */
  const [session, setSession] = useState(() => {
    try { return sessionStorage.getItem("wc_user") || null; } catch { return null; }
  });
  const [blocked, setBlocked] = useState(false); // true when current user was kicked
  const [blockedUsers, setBlockedUsers] = useState([]);

  const handleLogin = async (user) => {
    // Check if user is blocked before allowing login
    try {
      const bl = await DataLayer.get("blocked_users_v8");
      if (bl && bl.includes(user)) {
        setBlocked(true);
        try { sessionStorage.setItem("wc_user_last", user); } catch {}
        return;
      }
    } catch {}
    try { sessionStorage.setItem("wc_user", user); } catch {}
    await logAccess(user);
    setSession(user);
    setActiveUser(user);
  };
  const handleLogout = () => {
    try { sessionStorage.removeItem("wc_user"); } catch {}
    setSession(null);
    setBlocked(false);
  };

  /* ── HEARTBEAT: checa a cada 30s se o usuário foi bloqueado ── */
  useEffect(() => {
    const loadBlocked = async () => {
      try {
        const bl = await DataLayer.get("blocked_users_v8");
        setBlockedUsers(bl || []);
        return bl || [];
      } catch { return []; }
    };
    // Carrega lista ao montar e verifica sessão atual
    loadBlocked().then(bl => {
      const currentUser = sessionStorage.getItem("wc_user");
      if (currentUser && bl && bl.includes(currentUser)) {
        try { sessionStorage.setItem("wc_user_last", currentUser); } catch {}
        setBlocked(true);
        setSession(null);
        try { sessionStorage.removeItem("wc_user"); } catch {}
      }
    });
    // Verifica periodicamente
    const interval = setInterval(async () => {
      const bl = await loadBlocked();
      const currentUser = sessionStorage.getItem("wc_user");
      if (currentUser && bl && bl.includes(currentUser)) {
        // Usuário foi bloqueado — derrubar sessão
        try { sessionStorage.setItem("wc_user_last", currentUser); } catch {}
        setBlocked(true);
        setSession(null);
        try { sessionStorage.removeItem("wc_user"); } catch {}
      }
    }, 30000); // 30 segundos
    return () => clearInterval(interval);
  }, []);

  const saveBlockedUsers = async (list) => {
    setBlockedUsers(list);
    await DataLayer.set("blocked_users_v8", list);
  };

  const [darkMode, setDarkMode] = useState(true);
  const [templates, setTemplates] = useState(DEFAULT_TEMPLATES);
  const [procs, setProcs] = useState([]);
  const [clientBase, setClientBase] = useState(INITIAL_BASE);
  const [loaded, setLoaded] = useState(false);

  const [view, setView] = useState("dashboard");
  const [selId, setSelId] = useState(null);
  const [activeUser, setActiveUser] = useState("Sabrina");
  const [userFilterMode, setUserFilterMode] = useState(false);
  const [modal, setModal] = useState(false);
  const [newForm, setNewForm] = useState({ type: "abertura", clientName: "", cnpj: "", socio: "", responsible: "Sabrina", isCorretora: true, clientCategory: "corretora", email: "" });

  /* ══ FORMULÁRIOS PENDENTES (form_submissions) ═══════════════ */
  const [pendingForms, setPendingForms] = useState([]);
  const [formsLoading, setFormsLoading] = useState(false);
  const [expandedForm, setExpandedForm] = useState(null);
  const [formProcResp, setFormProcResp] = useState(null);
  const [formProcType, setFormProcType] = useState("abertura");

  const fetchPendingForms = useCallback(async () => {
    if (!USE_SUPABASE) return;
    setFormsLoading(true);
    try {
      const r = await fetch("/.netlify/functions/data-proxy", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ action: "getForms" }),
      });
      if (r.ok) { const data = await r.json(); setPendingForms(Array.isArray(data) ? data : []); }
    } catch (e) { console.warn("Erro ao buscar formulários:", e); }
    setFormsLoading(false);
  }, []);

  useEffect(() => { fetchPendingForms(); const iv = setInterval(fetchPendingForms, 60000); return () => clearInterval(iv); }, [fetchPendingForms]);

  const markFormProcessed = async (formId) => {
    if (!USE_SUPABASE) return;
    try {
      await fetch("/.netlify/functions/data-proxy", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ action: "updateForm", formId, status: "processed", processedBy: activeUser }),
      });
      setPendingForms(prev => prev.filter(f => f.id !== formId));
    } catch (e) { console.warn("Erro ao marcar formulário:", e); }
  };

  const createProcFromForm = (form) => {
    const fd = form.form_data || {};
    const socio1 = (fd.socios && fd.socios[0]) || {};
    const razao = fd.empresa?.razao_social_1 || fd.empresa?.razao_social || "";
    const clientName = razao || socio1.nome || "(Sem nome)";
    const socioInfo = [socio1.nome, socio1.whatsapp].filter(Boolean).join(" — ");
    const cat = fd.clientCategory || "outros";
    const isCort = cat === "prudential" || cat === "corretora";
    /* ── Default de responsável (item 5) ─────────────────────────
       Se o formulário veio via link público (form_data.submittedVia === "form_link"
       ou form_data.responsible já preenchido), o responsável padrão é "WEB CONTADOR".
       Caso contrário (processo gerado em sistema), mantém o usuário logado. */
    const respFromForm = fd.responsible || (fd.submittedVia === "form_link" ? "WEB CONTADOR" : null);
    const resp = formProcResp || respFromForm || activeUser;
    const procType = formProcType || "abertura";

    const s0 = new Date().toISOString().slice(0, 10);
    const steps = buildSteps(procType, 0, s0, templates, isCort, cat);
    const typeLabel = templates[procType]?.label || procType;
    const newProcId = "P" + String(procs.length + 1).padStart(3, "0");
    const tsNow = new Date().toISOString();

    // ── Processo ativo (fluxo normal) ──────────────────────────────
    const np = {
      id: newProcId,
      type: procType, clientName, cnpj: "", socio: socioInfo,
      responsible: resp, isCorretora: isCort, clientCategory: cat,
      email: socio1.email || "", startDate: s0, status: "active", obs: "",
      origin: "formulario", formId: form.id,
      steps, log: [{ ts: tsNow, user: activeUser, action: `Processo criado via Formulário — ${typeLabel} (${CATEGORY_LABELS[cat] || cat})` }]
    };

    // ── Cópia arquivada do formulário original ─────────────────────
    // Preserva todos os dados preenchidos pela equipe para consulta futura.
    // ID usa sufixo "-F" para identificar que é cópia de formulário.
    const formDataObs = (() => {
      const linhas = [];
      if (fd.empresa) {
        const e = fd.empresa;
        if (e.razao_social_1 || e.razao_social) linhas.push("Razão Social: " + (e.razao_social_1 || e.razao_social));
        if (e.cnpj) linhas.push("CNPJ: " + e.cnpj);
        if (e.atividade) linhas.push("Atividade: " + e.atividade);
        if (e.endereco) linhas.push("Endereço: " + e.endereco);
        if (e.capital_social) linhas.push("Capital Social: " + e.capital_social);
      }
      if (fd.socios && fd.socios.length > 0) {
        fd.socios.forEach((s, i) => {

  const calcForecast = (proc) => {
    const today = new Date();
    today.setHours(0,0,0,0);
    let cursorStr = todayStr();
    let hasActive = false;
    for (const step of proc.steps) {
      if (step.completedAt || step.skipped) continue;
      if (!step.activatedAt) {
        // ainda não ativada — soma dias úteis a partir do cursor
        const next = addBusinessDays(cursorStr, step.deadlineDays || 5);
        if (next) cursorStr = next; /* PROTEÇÃO: mantém cursor se data inválida */
      } else {
        // ativa agora — cursor parte do prazo dela (dias úteis)
        const deadlineStr = addBusinessDays(step.activatedAt, step.deadlineDays || 5);
        if (deadlineStr) {
          cursorStr = deadlineStr > cursorStr ? deadlineStr : cursorStr;
        }
        hasActive = true;
      }
    }
    if (!hasActive && !proc.steps.some(s => !s.completedAt && !s.skipped)) return null;
    if (!isValidDateStr(cursorStr)) return null; /* PROTEÇÃO final */
    return new Date(cursorStr + "T12:00:00");

  /* ── DEADLINE MODAL ──────────────────────────────────── */
  const openDeadlineModal = (procId, stepIdx) => {
    const proc = procs.find(p => p.id === procId);
    if (!proc) return;
    setDeadlineModal({ procId, stepIdx, currentDays: proc.steps[stepIdx].deadlineDays, stepName: proc.steps[stepIdx].name, type: proc.type });
    setDeadlineValue(String(proc.steps[stepIdx].deadlineDays));
  };
  const saveDeadline = (scope) => {
    const days = parseInt(deadlineValue);
    if (isNaN(days) || days < 1 || !deadlineModal) return;
    if (scope === "this") {
      saveProcs(prev => prev.map(p => { if (p.id !== deadlineModal.procId) return p; return { ...p, steps: p.steps.map((s, i) => i === deadlineModal.stepIdx ? { ...s, deadlineDays: days } : s), log: [...p.log, { ts: new Date().toISOString(), user: activeUser, action: `Prazo etapa ${deadlineModal.stepIdx + 1} → ${days}d (só este processo)` }] }; }));
      showToast(`${days}d — somente este processo`);
    } else {
      const nt = { ...templates, [deadlineModal.type]: { ...templates[deadlineModal.type], steps: templates[deadlineModal.type].steps.map((s, i) => i === deadlineModal.stepIdx ? { ...s, days } : s) } };
      saveTemplates(nt);
      showToast(`Template atualizado: etapa ${deadlineModal.stepIdx + 1} → ${days}d`);
    }
    setDeadlineModal(null);
  };

  /* ── SYNC PROCESSES WITH TEMPLATE ──────────────────── */
  const syncProcessesWithTemplate = (type, category) => {
    const tplSteps = getTemplateSteps(templates[type], category);
    if (!tplSteps.length) return 0;
    let count = 0;
    saveProcs(prev => prev.map(p => {
      if (p.type !== type || p.status !== "active") return p;
      const pCat = migrateCategory(p);
      if (pCat !== category) return p;
      const completedCount = p.steps.filter(s => s.completedAt).length;
      const completedSteps = p.steps.slice(0, completedCount);
      const lastDone = completedSteps.length > 0 ? completedSteps[completedSteps.length - 1].completedAt : p.startDate;
      const newPending = tplSteps.slice(completedCount).map((s, i) => ({
        id: completedCount + i,
        name: s.name,
        deadlineDays: s.days,
        clientDependent: s.clientDependent || false,
        activatedAt: i === 0 ? lastDone : null,
        completedAt: null,
        completedBy: null,
        notes: "",
      }));
      const newSteps = [...completedSteps, ...newPending];
      count++;
      return {
        ...p,
        steps: newSteps,
        log: [...p.log, { ts: new Date().toISOString(), user: activeUser, action: "Etapas sincronizadas com template (" + CATEGORY_LABELS[category] + ")" }]
      };
    }));
    return count;
  };

  const saveObs = (procId, obsText) => { saveProcs(prev => prev.map(p => p.id === procId ? { ...p, obs: obsText } : p)); showToast("Salvo!"); };
  const saveStepNotes = (procId, stepIdx, notes) => { saveProcs(prev => prev.map(p => { if (p.id !== procId) return p; return { ...p, steps: p.steps.map((s, i) => i === stepIdx ? { ...s, notes } : s) }; })); showToast("Nota salva!"); };

  const saveStepDates = () => {
    if (!editStepDates) return;
    const { procId, stepIdx, activatedAt, completedAt, completedBy } = editStepDates;
    /* PROTEÇÃO: valida datas antes de salvar — evita bug tipo "52026-04-01" */
    if (activatedAt && !isValidDateStr(activatedAt)) {
      showToast("❌ Data de início inválida. Use o calendário ou formato AAAA-MM-DD com ano entre 2020 e 2040.", "error");
      return;
    }
    if (completedAt && !isValidDateStr(completedAt)) {
      showToast("❌ Data de conclusão inválida. Use o calendário ou formato AAAA-MM-DD com ano entre 2020 e 2040.", "error");
      return;
    }
    if (activatedAt && completedAt && completedAt < activatedAt) {
      showToast("❌ Data de conclusão não pode ser anterior à data de início.", "error");
      return;
    }
    saveProcs(prev => prev.map(p => {
      if (p.id !== procId) return p;
      const newSteps = p.steps.map((s, i) => {
        if (i !== stepIdx) return s;
        return { ...s, activatedAt: activatedAt || s.activatedAt, completedAt: completedAt || null, completedBy: completedAt ? (completedBy || s.completedBy || activeUser) : null };
      });
      const applicable = newSteps.filter(s => !s.skipped);
      const allDone = applicable.length > 0 && applicable.every(s => s.completedAt);
      const hasPendingCustom = newSteps.some(s => s.custom && !s.completedAt && !s.skipped);
      return { ...p, steps: newSteps, status: (allDone && !hasPendingCustom) ? "completed" : "active", log: [...p.log, { ts: new Date().toISOString(), user: activeUser, action: `Etapa ${stepIdx + 1} editada: Ini=${activatedAt || "—"} Conc=${completedAt || "reaberta"} Por=${completedBy || "—"}` }] };
    }));
    setEditStepDates(null);
    showToast("Datas da etapa atualizadas!");
  };

  /* ── N/A — pular etapa ────────────────────────── */
  const toggleSkip = (procId, stepIdx) => {
    saveProcs(prev => prev.map(p => {
      if (p.id !== procId) return p;
      const steps = p.steps.map((s, i) => i === stepIdx ? { ...s, skipped: !s.skipped, completedAt: null, completedBy: null } : s);
      const applicable = steps.filter(s => !s.skipped);
      const allDone = applicable.length > 0 && applicable.every(s => s.completedAt);
      const hasPendingCustom = steps.some(s => s.custom && !s.completedAt && !s.skipped);
      return { ...p, steps, status: (allDone && !hasPendingCustom) ? "completed" : "active", log: [...p.log, { ts: new Date().toISOString(), user: activeUser, action: `Etapa ${stepIdx+1} ${steps[stepIdx].skipped ? "marcada N/A" : "restaurada"}: ${p.steps[stepIdx].name}` }] };
    }));
    showToast("Etapa atualizada!");
  };

  const addCustomStep = (procId) => {
    if (!newStepForm.name.trim()) return;
    const stepName = newStepForm.name.trim();
    const stepDays = parseInt(newStepForm.days) || 5;
    const isClient = !!newStepForm.clientDependent;
    const activateAt = todayStr(); // Sempre ativa a partir de HOJE
    saveProcs(prev => prev.map(p => {
      if (p.id !== procId) return p;
      const ns = { id: p.steps.length, name: stepName, deadlineDays: stepDays, clientDependent: isClient, custom: true, activatedAt: activateAt, completedAt: null, completedBy: null, notes: "", skipped: false };
      const newSteps = [...p.steps, ns];
      const clientTag = isClient ? " 👤 Etapa cliente" : "";
      return { ...p, status: "active", steps: newSteps, log: [...p.log, { ts: new Date().toISOString(), user: activeUser, action: `Etapa individual adicionada: "${stepName}" (${stepDays} dias)${clientTag}` }] };
    }));
    setAddingStep(null); setNewStepForm({ name: "", days: "5", clientDependent: false }); showToast(`Etapa "${stepName}" adicionada (${stepDays} DU)${isClient ? " — cobrança automática ativa" : ""}!`);
  };

  const deleteStep = (procId, stepIdx) => {
    const proc = procs.find(p => p.id === procId);
    if (!proc) return;
    const removed = proc.steps[stepIdx];
    const timerId = setTimeout(() => setUndoQueue(q => q.filter(u => u.id !== timerId)), 5000);
    setUndoQueue(q => [...q, { id: timerId, procId, stepIdx, step: removed }]);
    saveProcs(prev => prev.map(p => {
      if (p.id !== procId) return p;
      const newSteps = p.steps.filter((_, i) => i !== stepIdx).map((s, i) => ({ ...s, id: i }));
      const applicable = newSteps.filter(s => !s.skipped);
      const allDone = applicable.length > 0 && applicable.every(s => s.completedAt);
      const hasPendingCustom = newSteps.some(s => s.custom && !s.completedAt && !s.skipped);
      return { ...p, status: (allDone && !hasPendingCustom) ? "completed" : "active", steps: newSteps, log: [...p.log, { ts: new Date().toISOString(), user: activeUser, action: `Etapa removida: ${removed.name}` }] };
    }));
    showToast("Etapa removida", "error", { label: "Desfazer", procId, stepIdx, step: removed });
  };

  const undoDelete = (item) => {
    clearTimeout(item.id); setUndoQueue(q => q.filter(u => u.id !== item.id));
    saveProcs(prev => prev.map(p => {
      if (p.id !== item.procId) return p;
      const steps = [...p.steps]; steps.splice(item.stepIdx, 0, item.step);
      const newSteps = steps.map((s, i) => ({ ...s, id: i }));
      const applicable = newSteps.filter(s => !s.skipped);
      const allDone = applicable.length > 0 && applicable.every(s => s.completedAt);
      const hasPendingCustom = newSteps.some(s => s.custom && !s.completedAt && !s.skipped);
      return { ...p, status: (allDone && !hasPendingCustom) ? "completed" : "active", steps: newSteps, log: [...p.log, { ts: new Date().toISOString(), user: activeUser, action: `Remoção desfeita: ${item.step.name}` }] };
    }));
    showToast("Desfeito!");
  };

  /* ── DELETE PROCESS (with reason) ──────────────────── */
  const confirmDeleteProcess = () => {
    if (!deleteModal || !deleteReason) return;
    saveProcs(prev => prev.map(p => {
      if (p.id !== deleteModal.id) return p;
      return { ...p, status: "deleted", log: [...p.log, { ts: new Date().toISOString(), user: activeUser, action: "PROCESSO EXCLUÍDO — Motivo: " + deleteReason }] };
    }));
    showToast("Processo " + deleteModal.id + " excluído: " + deleteReason, "error");
    setDeleteModal(null); setDeleteReason("");
    if (view === "detail") setView("list");
  };

  /* ── ARCHIVE PROCESS ─────────────────────────────────── */
  const confirmArchiveProcess = () => {
    if (!archiveModal) return;
    saveProcs(prev => prev.map(p => {
      if (p.id !== archiveModal.id) return p;
      return { ...p, status: "archived", obs: archiveReason ? (p.obs ? p.obs + " | ARQUIVADO: " + archiveReason : "ARQUIVADO: " + archiveReason) : p.obs, archivedAt: todayStr(), archivedBy: activeUser, log: [...p.log, { ts: new Date().toISOString(), user: activeUser, action: "PROCESSO ARQUIVADO — " + (archiveReason || "Sem motivo informado") }] };
    }));
    showToast("📦 Processo " + archiveModal.id + " arquivado com sucesso");
    setArchiveModal(null); setArchiveReason("");
    if (view === "detail") setView("list");
  };

  const reactivateProcess = (procId) => {
    saveProcs(prev => prev.map(p => {
      if (p.id !== procId) return p;
      return { ...p, status: "active", log: [...p.log, { ts: new Date().toISOString(), user: activeUser, action: "PROCESSO REATIVADO do arquivo" }] };
    }));
    showToast("✅ Processo reativado com sucesso!");
  };

  /* ── CHASE FOLLOW-UP ─────────────────────────────────── */
  const confirmChaseFollowUp = (action) => {
    if (!chaseModal) return;
    const { procId, stepIdx } = chaseModal;
    const days = parseInt(chaseExtendDays);
    if (action === "extend" && (isNaN(days) || days < 1)) return;
    
    saveProcs(prev => prev.map(p => {
      if (p.id !== procId) return p;
      const newSteps = p.steps.map((s, i) => {
        if (i !== stepIdx) return s;
        const prevLog = s.chaseLog || [];
        const newDeadline = action === "extend" ? addBusinessDays(todayStr(), days) : null;
        const entry = { date: todayStr(), note: chaseNote || "Follow-up registrado", by: activeUser, action, newDeadline, attempt: prevLog.length + 1 };
        return { ...s, chaseLog: [...prevLog, entry] };
      });
      const logMsg = action === "extend" 
        ? `Follow-up #${(p.steps[stepIdx].chaseLog || []).length + 1} etapa ${stepIdx+1}: "${chaseNote}" → +${days}d úteis`
        : `Follow-up #${(p.steps[stepIdx].chaseLog || []).length + 1} etapa ${stepIdx+1}: "${chaseNote}" → ARQUIVAR`;
      const newProc = { ...p, steps: newSteps, log: [...p.log, { ts: new Date().toISOString(), user: activeUser, action: logMsg }] };
      if (action === "archive") {
        return { ...newProc, status: "archived", archivedAt: todayStr(), archivedBy: activeUser, obs: (p.obs ? p.obs + " | " : "") + "ARQUIVADO: Cliente sem resposta após " + ((p.steps[stepIdx].chaseLog || []).length + 1) + " tentativas" };
      }
      return newProc;
    }));
    
    if (action === "archive") {
      showToast("📦 Processo arquivado — cliente sem resposta");
      if (view === "detail") setView("list");
    } else {
      showToast(`✅ Follow-up registrado — novo prazo: +${days} dias úteis`);
    }
    setChaseModal(null); setChaseNote(""); setChaseExtendDays("3");
  };

  const openChaseModal = (procId, stepIdx) => {
    const proc = procs.find(p => p.id === procId);
    if (!proc) return;
    setChaseModal({ procId, stepIdx, step: proc.steps[stepIdx], proc });
    setChaseNote(""); setChaseExtendDays("3");
  };

  /* ── HTML REPORT EMAIL ───────────────────────────────── */
  const generateHTMLReport = (alertList, allProcs, reportMode = "full") => {
    const late = alertList.filter(a => a.st === "late");
    const chase = alertList.filter(a => a.chaseNeeded && a.st !== "late");
    const byType = {};
    const activeProcs = allProcs.filter(p => p.status === "active");
    activeProcs.forEach(p => { byType[p.type] = (byType[p.type] || 0) + 1; });
    const today = new Date().toLocaleDateString("pt-BR");

    const lateRows = late.map(a => {
      const dl = addBusinessDays(a.activatedAt, a.deadlineDays);
      const proc = allProcs.find(pp => pp.id === a.procId);
      const fd = proc ? calcForecast(proc) : null;
      const tpl = (proc && (templates || DEFAULT_TEMPLATES)[proc.type]) || DEFAULT_TEMPLATES.abertura;
      /* Último contato: step notes ou obs do processo */
      const step = proc ? proc.steps.find((s, i) => i === a.stepIndex || s.name === a.name) : null;
      const lastContact = (step && step.notes && step.notes.trim())
        ? step.notes.trim()
        : (proc && proc.obs && proc.obs.trim())
          ? proc.obs.trim()
          : "—";
      return `<tr>
        <td style="padding:7px 12px;border-bottom:1px solid #e2e8f0;font-size:13px;font-weight:600;color:#1e293b">${a.clientName}</td>
        <td style="padding:7px 12px;border-bottom:1px solid #e2e8f0;font-size:12px;color:#374151;white-space:nowrap">${tpl.icon} ${tpl.label}</td>
        <td style="padding:7px 12px;border-bottom:1px solid #e2e8f0;font-size:12px;color:#374151">Etapa ${a.stepIndex + 1}: ${a.name}</td>
        <td style="padding:7px 12px;border-bottom:1px solid #e2e8f0;font-size:12px;color:#64748b;white-space:nowrap">${fmtDate(dl)}</td>
        <td style="padding:7px 12px;border-bottom:1px solid #e2e8f0;"><span style="background:#fee2e2;color:#dc2626;padding:2px 8px;border-radius:4px;font-weight:700;font-size:11px">${a.daysLate}d ATRASO</span></td>
        <td style="padding:7px 12px;border-bottom:1px solid #e2e8f0;font-size:11px;color:#64748b;max-width:220px">${lastContact}</td>
        <td style="padding:7px 12px;border-bottom:1px solid #e2e8f0;font-size:12px;color:#64748b;white-space:nowrap">${a.responsible}</td>
      </tr>`;
    }).join("");

    const chaseRows = chase.map(a => {
      const dl = addBusinessDays(a.activatedAt, a.deadlineDays);
      const daysLeft = dl >= todayStr() ? businessDaysDiff(todayStr(), dl) : -businessDaysDiff(dl, todayStr());
      return `<tr>
        <td style="padding:10px 14px;border-bottom:1px solid #e2e8f0;font-weight:600;color:#1e293b">${a.clientName}</td>
        <td style="padding:10px 14px;border-bottom:1px solid #e2e8f0;color:#374151">Etapa ${a.stepIndex + 1}: ${a.name}</td>
        <td style="padding:10px 14px;border-bottom:1px solid #e2e8f0;color:#64748b">${fmtDate(dl)}</td>
        <td style="padding:10px 14px;border-bottom:1px solid #e2e8f0;"><span style="background:#fef3c7;color:#92400e;padding:3px 10px;border-radius:4px;font-weight:700;font-size:12px">⏰ ${daysLeft <= 0 ? "HOJE" : daysLeft + " DU"}</span></td>
        <td style="padding:10px 14px;border-bottom:1px solid #e2e8f0;color:#64748b">${a.responsible}</td>
      </tr>`;
    }).join("");

    /* Active processes in progress (no late, no chase) */
    const lateIds = new Set(late.map(a => a.procId));
    const chaseIds = new Set(chase.map(a => a.procId));
    const onTrack = activeProcs.filter(p => !lateIds.has(p.id) && !chaseIds.has(p.id));
    const onTrackRows = onTrack.map(p => {
      const pct = Math.round((p.steps.filter(s => s.completedAt).length / p.steps.length) * 100);
      const currentStep = p.steps.find(s => s.activatedAt && !s.completedAt && !s.skipped);
      const fd = calcForecast(p);
      const tpl = templates[p.type] || DEFAULT_TEMPLATES.abertura;
      return `<tr>
        <td style="padding:10px 14px;border-bottom:1px solid #e2e8f0;font-weight:600;color:#1e293b">${p.clientName}</td>
        <td style="padding:10px 14px;border-bottom:1px solid #e2e8f0;color:#374151">${tpl.icon} ${tpl.label}</td>
        <td style="padding:10px 14px;border-bottom:1px solid #e2e8f0;color:#374151">${currentStep ? currentStep.name : "—"}</td>
        <td style="padding:10px 14px;border-bottom:1px solid #e2e8f0;"><span style="background:#dbeafe;color:#2563eb;padding:3px 10px;border-radius:4px;font-weight:700;font-size:12px">${pct}%</span></td>
        <td style="padding:10px 14px;border-bottom:1px solid #e2e8f0;color:#64748b">${fd ? fd.toLocaleDateString("pt-BR") : "—"}</td>
        <td style="padding:10px 14px;border-bottom:1px solid #e2e8f0;color:#64748b">${p.responsible}</td>
      </tr>`;
    }).join("");

    const reportTitle = reportMode === "late" ? "Relatório de ATRASADOS" : "Relatório Completo";
    const showChase = reportMode === "full";
    const showOnTrack = reportMode === "full";

    return `<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>${reportTitle} — Societário — ${today}</title>
<style>body{font-family:Arial,Helvetica,sans-serif;background:#f8fafc;color:#1e293b;margin:0;padding:20px}
.container{max-width:1000px;margin:0 auto;background:white;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.1)}
.header{background:#1e293b;color:white;padding:24px 32px;display:flex;justify-content:space-between;align-items:center}
.kpi-row{display:flex;gap:16px;padding:24px 32px;background:#f8fafc;border-bottom:1px solid #e2e8f0;flex-wrap:wrap}
.kpi{flex:1;min-width:120px;text-align:center;padding:16px;background:white;border-radius:8px;border:1px solid #e2e8f0}
.kpi .num{font-size:32px;font-weight:800;line-height:1}
.kpi .lbl{font-size:12px;color:#64748b;margin-top:4px;font-weight:600}
.section{padding:24px 32px}
h2{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
table{width:100%;border-collapse:collapse}
th{background:#f1f5f9;color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:10px 14px;text-align:left;font-weight:700}
tr:hover td{background:#f8fafc}
.footer{padding:20px 32px;background:#f8fafc;border-top:1px solid #e2e8f0;font-size:12px;color:#64748b;text-align:center}
</style></head>
<body>
<div class="container">
  <div class="header">
    <div><div style="font-size:20px;font-weight:800">⚖️ PAINEL SOCIETÁRIO — WebContador</div><div style="font-size:13px;opacity:.7;margin-top:4px">${reportTitle} — ${today}</div></div>
    <div style="text-align:right;font-size:13px;opacity:.7">Módulo: Societário</div>
  </div>
  <div class="kpi-row">
    <div class="kpi"><div class="num" style="color:#3b82f6">${kpi.active}</div><div class="lbl">Em Andamento</div></div>
    <div class="kpi"><div class="num" style="color:#dc2626">${late.length}</div><div class="lbl">Etapas Atrasadas</div></div>
    <div class="kpi"><div class="num" style="color:#d97706">${chase.length}</div><div class="lbl">Cobrar Cliente</div></div>
    <div class="kpi"><div class="num" style="color:#16a34a">${kpi.completed}</div><div class="lbl">Concluídos</div></div>
  </div>
  ${late.length > 0 ? `<div class="section"><h2 style="color:#dc2626">🚨 Etapas em Atraso (${late.length})</h2>
  <table><thead><tr><th>Empresa</th><th>Tipo</th><th>Etapa</th><th>Prazo Era</th><th>Status</th><th>Último Contato / Obs.</th><th>Resp.</th></tr></thead>
  <tbody>${lateRows}</tbody></table></div>` : `<div class="section"><p style="color:#16a34a;font-weight:700;font-size:16px">✅ Nenhuma etapa em atraso! Parabéns!</p></div>`}
  ${showChase && chase.length > 0 ? `<div class="section" style="border-top:1px solid #e2e8f0"><h2 style="color:#d97706">⏰ Aguardando Cliente — Vence em breve (${chase.length})</h2>
  <table><thead><tr><th>Empresa</th><th>Etapa (aguardando)</th><th>Prazo</th><th>Status</th><th>Resp.</th></tr></thead>
  <tbody>${chaseRows}</tbody></table></div>` : ""}
  ${showOnTrack && onTrack.length > 0 ? `<div class="section" style="border-top:1px solid #e2e8f0"><h2 style="color:#3b82f6">✅ Em Andamento — no Prazo (${onTrack.length})</h2>
  <table><thead><tr><th>Empresa</th><th>Tipo</th><th>Etapa Atual</th><th>Progresso</th><th>Previsão</th><th>Resp.</th></tr></thead>
  <tbody>${onTrackRows}</tbody></table></div>` : ""}
  <div style="padding:20px 32px;text-align:center"><a href="${PLATFORM_URL}" style="display:inline-block;padding:12px 28px;background:#2563eb;color:white;border-radius:8px;text-decoration:none;font-weight:700;font-size:16px">🔗 Acessar o Painel Societário</a></div>
  <div class="footer"><a href="${PLATFORM_URL}" style="color:#3b82f6;font-weight:600;text-decoration:none">🔗 Acessar Painel Societário</a> — WebContador | ${today}</div>
</div></body></html>`;
  };

  const downloadHTMLReport = (alertList, reportMode = "full") => {
    const html = generateHTMLReport(alertList, procs, reportMode);
    const blob = new Blob([html], { type: "text/html;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const suffix = reportMode === "late" ? "Atrasados" : "Completo";
    a.href = url; a.download = `Relatorio_${suffix}_${todayStr()}.html`; a.click();
    URL.revokeObjectURL(url);
    showToast(`Relatório ${suffix} baixado! Abra no navegador para visualizar.`);
  };

  const sendEmailAlert = (alertItem) => {
    const dl = addBusinessDays(alertItem.activatedAt, alertItem.deadlineDays);
    const subject = encodeURIComponent(`[WebContador Societário] ${alertItem.st === "late" ? `ATRASO ${alertItem.daysLate}d` : "COBRAR CLIENTE ⏰"} — ${alertItem.clientName}`);
    const body = encodeURIComponent(`ALERTA — SOCIETÁRIO\n\nEmpresa : ${alertItem.clientName}\nEtapa   : ${alertItem.stepIndex + 1} — ${alertItem.name}\nPrazo   : ${fmtDate(dl)}\nStatus  : ${alertItem.st === "late" ? `${alertItem.daysLate}d em atraso` : "vence em breve — cobrar cliente"}\n\n— Painel Societário WebContador`);
    window.open(`mailto:?subject=${subject}&body=${body}`);
    setEmailModal(null); showToast("E-mail aberto!");

  /* ── EMAIL AUTOMÁTICO — ATRASO CRÍTICO ≥5 DU ─────────────────────
     Dispara para todos os ADMins quando houver processos com ≥5 DU de
     atraso. Throttle COMPARTILHADO via Supabase (DataLayer): no máximo
     1 envio por dia para TODO o time, independente de quantos usuários
     abrem o painel. Antes era localStorage (por dispositivo), o que
     gerava múltiplos e-mails por dia.
     Só dispara se template configurado (EMAILJS_POSITION_ENABLED=true). */
  const sendingPositionAlertRef = useRef(false);
  const sendPositionAlertEmail = useCallback(async (cases) => {
    if (!EMAILJS_POSITION_ENABLED || !cases.length) return;
    /* Guarda na sessão para evitar disparos duplicados na mesma aba (concorrência local) */
    if (sendingPositionAlertRef.current) return;
    sendingPositionAlertRef.current = true;
    const THROTTLE_KEY = "position_alert_last_sent";
    try {
      /* Throttle compartilhado: lê do Supabase via DataLayer (visível para toda a equipe) */
      const lastSent = await DataLayer.get(THROTTLE_KEY);
      if (lastSent) {
        const hours = (Date.now() - parseInt(lastSent)) / 3600000;
        if (hours < 24) { sendingPositionAlertRef.current = false; return; } // já enviado nas últimas 24h por alguém do time
      }
    } catch {}
    /* Monta lista de processos para o corpo do e-mail */
    const lista = cases.map(a =>
      `• ${a.clientName}\n  Etapa ${a.stepIndex + 1}: ${a.name} — ${a.daysLate} DU em atraso\n  Responsável: ${a.responsible}`
    ).join("\n\n");
    const adminEmails = USERS
      .filter(u => ["admin", "coordenador"].includes(USER_META[u]?.profile))
      .map(u => USER_META[u].email)
      .filter(Boolean)
      .join(",");
    if (!adminEmails) { sendingPositionAlertRef.current = false; return; }
    /* Marca o throttle ANTES de enviar para reduzir corrida entre múltiplos
       usuários abrindo o painel ao mesmo tempo. Se o envio falhar, reverte. */
    const sentAt = Date.now().toString();
    try { await DataLayer.set(THROTTLE_KEY, sentAt); } catch {}
    try {
      emailjs.init(EMAILJS_PK);
      await emailjs.send(EMAILJS_SVC, EMAILJS_POSITION_TEMPLATE, {
        to_email: adminEmails,
        total_casos: cases.length,
        lista_processos: lista,
        platform_url: PLATFORM_URL,
        data_hora: new Date().toLocaleDateString("pt-BR") + " " + new Date().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" }),
      });
      console.log(`✅ Alerta de atraso crítico enviado para ${adminEmails} (throttle compartilhado: 24h)`);
    } catch (e) {
      console.warn("EmailJS position alert falhou — revertendo throttle:", e);
      /* Reverte o throttle se o envio falhou para que o próximo carregamento tente de novo */
      try { await DataLayer.set(THROTTLE_KEY, ""); } catch {}
    } finally {
      sendingPositionAlertRef.current = false;
    }
  }, []);

  /* Dispara o e-mail quando positionAlerts muda e tem casos novos */

  /* ── EXPORT CSV ─────────────────────────────────────── */

  const parseImportText = useCallback((text, baseLen) => {

    return lines.map((line, i) => {
      const parts = line.includes("\t") ? line.split("\t") : line.split(";");
      const name = (parts[0] || "").trim();
      const cnpj = (parts[1] || "").trim();
      const tel = (parts[2] || "").trim();
      const email = (parts[3] || "").trim();
      return { id: "C" + String(baseLen + i + 1).padStart(3, "0"), name, cnpj, tel, email };
    }).filter(r => r.name);
  }, []);

          processos: procs,

        }
      };
      try {
        const logData = await DataLayer.get("access_log_v8");
        if (logData) backup.data.accessLog = logData;
      } catch {}
      const json = JSON.stringify(backup, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const now = new Date();
      const dateStr = now.toISOString().slice(0, 10).replace(/-/g, "");
      const timeStr = now.toTimeString().slice(0, 5).replace(":", "");
      a.href = url;
      a.download = `Backup_Societario_${dateStr}_${timeStr}.json`;

  const handleRestoreFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed.data || !parsed.data.processos || !parsed.data.baseClientes) {
          showToast("Arquivo inválido — não é um backup do Painel Societário.", "error");
          return;
        }
        setRestorePreview({
          exportedAt: parsed.exportedAt,
          exportedBy: parsed.exportedBy || "—",
          processos: parsed.data.processos.length,
          clientes: parsed.data.baseClientes.length,
          templates: parsed.data.templates ? Object.keys(parsed.data.templates).length : 0,
          hasLog: !!parsed.data.accessLog,
          raw: parsed,
        });
        setShowRestoreModal(true);
      } catch {
        showToast("Erro ao ler arquivo. Verifique se é um JSON válido.", "error");
      }
